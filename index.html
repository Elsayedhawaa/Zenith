<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zenith Breathing App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-darkest: #293855;
      --color-primary: #4165D5;
      --color-accent: #F1AC20;
      --color-light: #C3E8C9;
      --gradient-primary: linear-gradient(120deg, var(--color-primary), var(--color-accent));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', system-ui, Arial, sans-serif;
      background: var(--color-light);
      color: var(--color-darkest);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .app {
      background: white;
      width: 90vw;
      max-width: 980px;
      height: 70vh;
      max-height: 600px;
      display: flex;
      gap: 24px;
      border-radius: 18px;
      box-shadow: 0 6px 50px rgba(65,101,213,0.25);
      overflow: hidden;
    }

    /* Left column - controls */
    .controls {
      flex: 0 0 400px;
      padding: 32px 32px 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      background: var(--color-light);
      border-radius: 18px 0 0 18px;
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      margin: 0;
      color: var(--color-darkest);
      user-select: text;
    }

    .subtitle {
      font-size: 1rem;
      color: #3f5c46;
      margin-top: -8px;
      font-weight: 500;
      user-select: text;
    }

    .settings-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 12px;
      justify-content: space-between;
    }

    .setting-box {
      flex: 1 0 48%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      color: var(--color-primary);
      font-weight: 600;
      font-size: 0.95rem;
      user-select: text;
    }

    input[type=number], select {
      padding: 10px 12px;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 12px;
      border: 2px solid var(--color-primary);
      color: var(--color-darkest);
      outline-offset: 2px;
      transition: border-color 0.2s ease;
      user-select: text;
    }
    input[type=number]:focus, select:focus {
      border-color: var(--color-accent);
    }

    /* Total Time select and input row */
    .row {
      display: flex;
      gap: 16px;
      margin-top: 6px;
    }

    select {
      flex: none;
      min-width: 100px;
      cursor: pointer;
    }
    input[type=number] {
      flex: 1;
    }

    /* Toggle switches group */
    .options {
      display: flex;
      gap: 32px;
      align-items: center;
      margin-top: 8px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: var(--color-primary);
      cursor: pointer;
      user-select: none;
    }

    .switch {
      position: relative;
      width: 48px;
      height: 26px;
      border-radius: 30px;
      background: var(--color-light);
      border: 2px solid var(--color-primary);
      box-shadow: inset 0 0 6px rgba(65, 101, 213, 0.25);
      transition: background 0.3s ease;
    }

    .switch.on {
      background: var(--gradient-primary);
      box-shadow: 0 0 8px rgba(241, 172, 32, 0.6);
      border-color: var(--color-accent);
    }

    .knob {
      position: absolute;
      top: 3px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      transition: left 0.3s ease;
      box-shadow: 0 3px 8px rgba(65, 101, 213, 0.45);
    }

    .switch.on .knob {
      left: 24px;
      box-shadow: 0 3px 12px rgba(255, 183, 17, 0.9);
    }

    /* Meta/status and hint */
    .meta-row {
      font-weight: 600;
      font-size: 0.9rem;
      color: #375337;
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      user-select: none;
    }

    .hint {
      font-size: 0.85rem;
      font-weight: 500;
      color: #547a52;
      user-select: none;
      margin-top: 6px;
      text-align: center;
    }

    /* Right column - visual circle and buttons */
    .visual {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 36px;
      justify-content: center;
      background: var(--color-darkest);
      border-radius: 0 18px 18px 0;
      box-shadow: inset 0 0 40px rgba(65,101,213,0.15);
      color: white;
      user-select: none;
      position: relative;
    }

    .circle-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 0 15px #f1ac2085);
    }

    .pulse-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.2;
      border: 3px solid var(--color-accent);
      box-shadow: 0 10px 30px var(--color-accent) inset;
      transition: opacity 0.4s ease, transform 0.4s ease;
      transform: scale(0.95);
      animation: pulseAnimation 6s ease-in-out infinite;
    }

    @keyframes pulseAnimation {
      0%, 100% { opacity: 0.2; transform: scale(0.95); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    .orbit {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      box-shadow: 0 0 25px 5px var(--color-primary);
      pointer-events: none;
      animation: orbitMotion 8s linear infinite;
      opacity: 0.7;
      top: -20px;
      left: -20px;
    }
    @keyframes orbitMotion {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .breath-circle {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: var(--gradient-primary);
      box-shadow: 0 8px 40px var(--color-primary);
      display: grid;
      place-items: center;
      border: 3px solid var(--color-accent);
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease;
      cursor: default;
      user-select: none;
    }

    .breath-circle.glow {
      box-shadow: 0 22px 66px #f1ac2077, 0 8px 30px var(--color-primary);
    }

    .phase-label {
      font-size: 1.3rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 4px #0008;
    }

    .big-number {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -1.5px;
      margin-top: 8px;
      color: white;
      text-shadow: 0 8px 20px #f1ac20aa;
      user-select: none;
    }

    .small {
      font-size: 0.95rem;
      margin-top: 5px;
      color: #c9d8c5dd;
      user-select: none;
    }

    .phrase {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--color-accent);
      padding: 10px 26px;
      border-radius: 28px;
      background: rgba(33, 76, 50, 0.2);
      box-shadow: 0 5px 20px var(--color-accent);
      user-select: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      text-align: center;
      min-height: 48px;
    }
    .phrase.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .start-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .start-large, .muted-btn {
      font-weight: 700;
      font-size: 1.2rem;
      border-radius: 30px;
      border: none;
      padding: 14px 48px;
      cursor: pointer;
      user-select: none;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .start-large {
      background: var(--gradient-primary);
      color: white;
      box-shadow: 0 10px 30px var(--color-accent);
      animation: breatheBtn 3s ease-in-out infinite;
      letter-spacing: 0.04em;
    }
    @keyframes breatheBtn {
      0%, 100% { transform: scale(1); box-shadow: 0 10px 30px var(--color-accent);}
      50% { transform: scale(1.05); box-shadow: 0 20px 60px var(--color-accent);}
    }
    .start-large:hover {
      background: var(--gradient-btn-rev);
      box-shadow: 0 18px 60px var(--color-accent);
    }

    .muted-btn {
      background: var(--color-primary);
      color: white;
      padding: 14px 32px;
      box-shadow: 0 6px 20px var(--color-primary);
      min-width: 120px;
    }

    .muted-btn:hover {
      background: var(--color-accent);
      box-shadow: 0 8px 26px var(--color-accent);
    }

    /* Theme toggle button matching interface */
    .theme-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--color-accent);
      background: var(--color-light);
      box-shadow: 0 0 8px var(--color-accent);
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      color: var(--color-primary);
      user-select: none;
      z-index: 10;
    }
    .theme-btn:hover {
      background: var(--color-accent);
      color: white;
      box-shadow: 0 0 15px var(--color-accent);
    }

  </style>
</head>
<body>
  <div class="stars-bg" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <circle cx="55"  cy="100" r="1.3" fill="#fff" opacity="0.78"/>
      <circle cx="330" cy="71" r="1.5" fill="#fff" opacity="0.67"/>
      <circle cx="380" cy="190" r="1.1" fill="#c3e8c9" opacity="0.57"/>
      <circle cx="489" cy="150" r="1.7" fill="#f1ac20" opacity="0.30"/>
      <circle cx="69" cy="290" r="1.3" fill="#fff" opacity="0.78"/>
      <circle cx="82" cy="560" r="1.7" fill="#4165d5" opacity="0.67"/>
      <circle cx="160" cy="480" r="1.45" fill="#fff" opacity="0.54"/>
      <circle cx="270" cy="420" r="1.10" fill="#4165d5" opacity="0.62"/>
      <circle cx="99" cy="640" r="1.3" fill="#f1ac20" opacity="0.77"/>
      <circle cx="60" cy="900" r="1.5" fill="#fff" opacity="0.70"/>
      <circle cx="1100" cy="190" r="1.4" fill="#fff" opacity="0.68"/>
      <circle cx="790" cy="400" r="1.6" fill="#4165d5" opacity="0.53"/>
      <circle cx="650" cy="250" r="1.23" fill="#F1AC20" opacity="0.50"/>
      <circle cx="990" cy="570" r="1.65" fill="#fff" opacity="0.69"/>
      <circle cx="1200" cy="660" r="1.1" fill="#C3E8C9" opacity="0.47"/>
      <circle cx="1330" cy="380" r="1.5" fill="#4165d5" opacity="0.57"/>
      <circle cx="910" cy="770" r="1.5" fill="#fff" opacity="0.63"/>
    </svg>
  </div>

  <button id="themeBtn" aria-label="Toggle theme" title="Toggle theme" class="theme-btn">🌙</button>

  <div class="app" role="application" aria-label="Zenith Breathing App">
    <div class="controls" aria-label="Controls">
      <div class="title" tabindex="0">Zenith Breathing App</div>
      <div class="subtitle">A calm, private breathing tool — customize seconds, voice, and beep.</div>
      <div class="settings-grid">
        <div class="setting-box">
          <label for="inhale">Inhale (sec)</label>
          <input id="inhale" type="number" min="0" value="4" />
        </div>
        <div class="setting-box">
          <label for="hold1">Hold after inhale (sec)</label>
          <input id="hold1" type="number" min="0" value="0" />
        </div>
        <div class="setting-box">
          <label for="exhale">Exhale (sec)</label>
          <input id="exhale" type="number" min="0" value="6" />
        </div>
        <div class="setting-box">
          <label for="hold2">Hold after exhale (sec)</label>
          <input id="hold2" type="number" min="0" value="0" />
        </div>
      </div>
      <label for="total" style="font-weight: 600; margin-top: 16px; color: var(--color-primary)">Total time</label>
      <div class="row">
        <select id="total" aria-label="Total time select">
          <option value="60">1 minute</option>
          <option value="120" selected>2 minutes</option>
          <option value="300">5 minutes</option>
          <option value="600">10 minutes</option>
          <option value="-1">Repeat indefinitely</option>
        </select>
        <input id="customTotal" type="number" min="10" placeholder="Custom sec (optional)" style="flex: 1;" />
      </div>
      <div class="options">
        <div class="toggle" title="Toggle beep" tabindex="0" role="button" aria-pressed="true">
          <span>Beep</span>
          <div id="beepSwitch" class="switch on"><div class="knob"></div></div>
        </div>
        <div class="toggle" title="Toggle voice" tabindex="0" role="button" aria-pressed="false">
          <span>Voice</span>
          <div id="voiceSwitch" class="switch"><div class="knob"></div></div>
        </div>
      </div>
      <div class="meta-row" aria-live="polite">
        <span>Status: <strong id="status">stopped</strong></span>
        <span>Cycle length: <strong id="cycleLen">0s</strong></span>
      </div>
      <div class="hint">Tip: Press <strong>Start</strong> or hit <strong>Space</strong>. Press <strong>R</strong> to reset.</div>
    </div>

    <div class="visual" aria-label="Visual breathing area">
      <div class="circle-wrap">
        <div id="pulse" class="pulse-ring"></div>
        <div class="orbit"></div>
        <div id="circle" class="breath-circle" role="img" aria-label="Breathing circle" tabindex="0">
          <div style="text-align: center;">
            <div class="phase-label" id="phase">—</div>
            <div class="big-number" id="phaseTime">0s</div>
            <div style="height: 12px;"></div>
            <div class="small">Total left: <span id="totalTime">0s</span></div>
          </div>
        </div>
      </div>
      <div class="phrase" id="phrase">Welcome — set your timings and press Start</div>
      <div class="start-area">
        <button id="startBtn" class="start-large" aria-pressed="false">Start</button>
        <div style="display: flex; gap: 18px; margin-top: 12px;">
          <button id="pauseBtn" class="muted-btn" title="Pause/resume">Pause</button>
          <button id="resetBtn" class="muted-btn" title="Reset (R)">Reset</button>
        </div>
      </div>
    </div>
  </div>

</html>
