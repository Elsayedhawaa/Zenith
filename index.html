<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zenith — Breathing App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root {
  --ink-dark: #062c23;
  --ink-light: #f6fffb;
  --green-primary: #10b981;
  --green-accent: #34d399;
  --bg-dark-a: #042019;
  --bg-dark-b: #064e3b;
  --bg-light-a: #eafff7;
  --bg-light-b: #d8fff0;
  --radius-card: 18px;
  --radius-field: 14px;
  --header-height: 80px;
}
html,body { height:100%; margin:0; }
body {
  font-family:'Poppins',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  background: linear-gradient(135deg,var(--bg-dark-a),var(--bg-dark-b));
  color: var(--ink-light);
}
body.light {
  background: linear-gradient(135deg,var(--bg-light-a),var(--bg-light-b));
  color: var(--ink-dark);
}
.sky { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events:none; opacity:.24; filter: blur(.8px); background:
    radial-gradient(circle at 25% 15%, #bbffe833 1.5px, transparent 2px),
    radial-gradient(circle at 78% 38%, #eafff64d 1.7px, transparent 2.4px),
    radial-gradient(circle at 12% 72%, #6ff3c244 1.3px, transparent 2px),
    radial-gradient(circle at 85% 80%, #10b98133 1.2px, transparent 1.9px),
    radial-gradient(circle at 50% 50%, #a7f3d022 1.1px, transparent 1.6px);
  background-size: 360px 360px, 300px 300px, 320px 320px, 360px 360px, 260px 260px;
  animation: skyMove 90s linear infinite;}
@keyframes skyMove {
  0%{background-position:0 0,40px 20px,80px 0,0 0,-40px 20px;}
  100%{background-position:700px 520px,380px 300px,560px 380px,320px 240px,200px 190px;}
}

/* Header (no box, only logo+name centered at very top) */
.site-header {
  position: fixed;
  left: 0; top: 0; right: 0; z-index: 50;
  width: 100vw;
  height: var(--header-height);
  background: none;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.header-inner {
  display: flex; align-items: center; gap: 14px;
  pointer-events: auto;
}
.brand-logo { width: 44px; height: 44px; }
.ring {
  stroke: #10b981; stroke-width: 3; fill: none; stroke-linecap: round;
  stroke-dasharray: 120; stroke-dashoffset: 120;
  animation: ringDraw 2.4s cubic-bezier(.49,.11,.4,.90) forwards;
}
@keyframes ringDraw { to { stroke-dashoffset: 0; } }
.leaf {
  fill: url(#gradLeaf); transform-origin: 22px 22px;
  animation: leafPulse 2.4s ease-in-out infinite;
}
@keyframes leafPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.11);} }
.brand-name {
  font-weight: 900; font-size: 27px; letter-spacing: .38px; user-select: none; line-height: 1.2;
  color: var(--ink-light);
  text-shadow: 0 2px 8px rgba(16,185,129,.70);
  transition: color .22s;
}
body.light .brand-name {
  color: var(--green-primary);
  text-shadow: none;
}

/* Theme toggle */
.theme-btn {
  position: fixed;
  top: 18px;
  right: 36px;
  z-index: 100;
  width: 44px;
  height: 44px;
  display: grid; place-items: center;
  font-size: 24px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  color: var(--green-accent);
  box-shadow: 0 4px 16px rgba(16,185,129,0.17);
  cursor: pointer;
  pointer-events: auto;
  outline: none;
  transition: background .15s, box-shadow .14s, color .18s;
}
body.light .theme-btn { background: #fff; color: var(--green-primary);}
.theme-btn:active { background:rgba(52,211,153,0.13); box-shadow:0 6px 24px #34d39940; }

/* App container shifted below header */
.app {
  margin: calc(var(--header-height) + 30px) auto 0 auto;
  padding-bottom: 34px;
  width: min(1100px,96vw);
}
/* Card styling */
.card {
  border-radius: var(--radius-card);
  background: rgba(22,34,31,0.85);
  box-shadow: 0 10px 30px rgba(16,185,129,.23);
  margin-bottom: 24px;
}
body.light .card {
  background: #fff;
  box-shadow: 0 8px 22px #10b98118;
}
.visual { padding: 28px 20px 16px; display:flex; flex-direction:column; align-items:center; gap:22px;}
.circle-wrap{ width:min(420px,98vw); aspect-ratio:1; display: grid; place-items:center; }

/* ... keep your visual, control, and footer CSS as in previous version ... */

/* Footer (single, always at bottom) */
.site-footer {
  text-align:center;
  padding:18px 12px 10px 12px;
  font-weight:800;
  font-size:14px;
  color:#34d399;
  user-select:none;
  letter-spacing:.03em;
}
body.light .site-footer {
  color:var(--green-primary);
}
@media (max-width:720px){
  .header-inner .brand-name{ font-size: 18px;}
  .app{ padding:0;}
}
@media (prefers-reduced-motion: reduce){
  *{animation:none !important; transition:none!important;}
}
</style>
</head>
<body>
  <div class="sky" aria-hidden="true"></div>

  <!-- Header -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <svg class="brand-logo" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gradLeaf" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#10b981"/>
            <stop offset="100%" stop-color="#34d399"/>
          </linearGradient>
        </defs>
        <circle class="ring" cx="22" cy="22" r="18"/>
        <path class="leaf"
              d="M22 11 C29 15, 32 24, 22 36 C12 24, 15 15, 22 11 Z"/>
      </svg>
      <span class="brand-name">Zenith</span>
    </div>
  </header>
  <button id="themeBtn" class="theme-btn" aria-label="Toggle theme">🌙</button>

  <main class="app">
    <!-- Visual -->
    <section class="card visual">
      <div class="circle-wrap" id="circleWrap">
        <canvas id="trail" style="position:absolute; inset:8px; z-index:1; pointer-events:none;"></canvas>
        <div id="pulse" class="pulse"></div>
        <div class="orbit"></div>
        <div id="circle" class="circle">
          <div>
            <div class="phase" id="phase">—</div>
            <div class="big" id="phaseTime">0s</div>
            <div class="tiny">Total left: <span id="totalTime">0s</span></div>
          </div>
        </div>
      </div>
      <div class="phrase" id="phrase">Welcome — set your timings and press Start</div>
      <div class="actions">
        <button id="startBtn" class="btn" aria-pressed="false">Start</button>
        <button id="pauseBtn" class="btn alt" title="Pause/resume">Pause</button>
        <button id="resetBtn" class="btn alt" title="Reset">Reset</button>
      </div>
    </section>
    <!-- Controls -->
    <section class="card controls">
      <div class="grid">
        <div class="field">
          <label for="inhale">Inhale (sec)</label>
          <input id="inhale" type="number" min="0" value="4" />
        </div>
        <div class="field">
          <label for="hold1">Hold after inhale (sec)</label>
          <input id="hold1" type="number" min="0" value="0" />
        </div>
        <div class="field">
          <label for="exhale">Exhale (sec)</label>
          <input id="exhale" type="number" min="0" value="6" />
        </div>
        <div class="field">
          <label for="hold2">Hold after exhale (sec)</label>
          <input id="hold2" type="number" min="0" value="0" />
        </div>
      </div>
      <div>
        <label style="font-size:13px; font-weight:900; color:#34d399;">Total time</label>
        <div class="row">
          <select id="total" aria-label="Total session length">
            <option value="60">1 minute</option>
            <option value="120" selected>2 minutes</option>
            <option value="300">5 minutes</option>
            <option value="600">10 minutes</option>
            <option value="-1">Repeat indefinitely</option>
          </select>
          <input id="customTotal" type="number" min="10" placeholder="Custom sec (optional)" style="flex:1" />
        </div>
      </div>
      <div class="options">
        <div id="beepToggle" class="toggle" role="button" aria-pressed="true" tabindex="0">
          <span>Beep</span>
          <div class="switch on"><div class="knob"></div></div>
        </div>
        <div id="voiceToggle" class="toggle" role="button" aria-pressed="false" tabindex="0">
          <span>Voice</span>
          <div class="switch"><div class="knob"></div></div>
        </div>
      </div>
      <div class="meta">
        <div>Status: <strong id="status">stopped</strong></div>
        <div>Cycle length: <strong id="cycleLen">0s</strong></div>
      </div>
      <div class="hint">Tip: press <strong>Space</strong> to Start/Pause, <strong>R</strong> to Reset.</div>
    </section>
    <footer class="site-footer">© 2025 Zenith. All rights reserved.</footer>
  </main>
<script>
// JS code unchanged from previous explanations (see full solution above)
</script>
</body>
</html>
