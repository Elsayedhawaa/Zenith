<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zenith Breathing App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

<style>
  :root{
    /* Green-first palette (calm) */
    --bg-dark-a:#012421;
    --bg-dark-b:#003733;

    --accent-1:#023336;   /* deep teal text on dark */
    --accent-2:#4DA564;   /* primary green */
    --accent-3:#C1E6BA;   /* soft mint text */
    --accent-4:#EAF8E7;   /* near white text */

    --ink-strong:#083b36; /* dark text on light */
    --ink-muted:#2b6f60;

    --panel-glass:rgba(255,255,255,0.04);
    --panel-stroke:rgba(255,255,255,0.07);

    --ring-soft:#6fd28a;
    --ring-deep:#2a9369;

    --primary-grad:linear-gradient(120deg,#4DA564 0%,#028a78 100%);
    --primary-grad-alt:linear-gradient(120deg,#028a78 0%,#4DA564 100%);

    --shadow-strong:0 18px 60px rgba(2,51,54,.28);
    --shadow-soft:0 10px 30px rgba(77,165,100,.28);
    --shadow-ui:0 10px 28px rgba(2,51,54,.22);

    --panel-radius:18px;
    --field-radius:14px;

    /* background breathing shift duration (synced from JS) */
    --breath-duration: 10s;
  }

  /* Base */
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:'Poppins',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    color:var(--accent-4);
    background: radial-gradient(1200px 800px at 20% -10%, #074236 0%, transparent 50%),
                linear-gradient(120deg,var(--bg-dark-a),var(--bg-dark-b));
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* Subtle whole-page hue/brightness breathing */
  @keyframes bgBreath {
    0%   { filter:hue-rotate(0deg) brightness(1); }
    50%  { filter:hue-rotate(4deg) brightness(1.04); }
    100% { filter:hue-rotate(0deg) brightness(1); }
  }
  body.breathing { animation: bgBreath var(--breath-duration) linear infinite; }

  /* Full-page, softly blurred, twinkling stars (non-blocking UI) */
  .sky{
    position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
    background:
      radial-gradient(circle at 25% 15%, #C1E6BA33 1.5px, transparent 2px),
      radial-gradient(circle at 78% 38%, #EAF8E74d 1.7px, transparent 2.4px),
      radial-gradient(circle at 12% 72%, #A4F3C144 1.3px, transparent 2px),
      radial-gradient(circle at 85% 80%, #7FD0A833 1.2px, transparent 1.9px),
      radial-gradient(circle at 50% 50%, #C1E6BA22 1.1px, transparent 1.6px),
      transparent;
    background-size: 300px 300px, 260px 260px, 280px 280px, 320px 320px, 240px 240px;
    filter: blur(1.2px);
  }
  .sky::before,
  .sky::after{
    content:"";
    position:absolute; inset:-25%;
    background:
      radial-gradient(circle, #EAF8E7 1px, transparent 1.7px) 0 0/ 6px 6px,
      radial-gradient(circle, #C1E6BA 1px, transparent 2.2px) 40px 30px/ 10px 10px,
      radial-gradient(circle, #7fd0a8 1px, transparent 1.8px) 80px 10px/ 14px 14px;
    opacity:.22;
    animation: twinkle 5.8s infinite ease-in-out alternate;
  }
  .sky::after{
    opacity:.18; filter: blur(0.8px);
    animation-duration: 7.2s;
    animation-delay: .6s;
  }
  @keyframes twinkle {
    0%{ transform: translate3d(0,0,0) scale(1); opacity:.12; }
    50%{ transform: translate3d(-1.5%, -1%, 0) scale(1.03); opacity:.26; }
    100%{ transform: translate3d(1%, 1.2%, 0) scale(0.98); opacity:.16; }
  }

  /* App shell (free layout, naturally stacked, centered) */
  .app{
    position:relative; z-index:2;
    width:min(1020px, 92vw);
    margin: clamp(18px, 5vh, 40px) auto;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  /* Header row */
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .title{
    font-size: clamp(22px, 3.2vw, 32px);
    font-weight:900; letter-spacing:-0.6px; margin:0;
    color:var(--accent-4);
    text-shadow: 0 6px 28px rgba(77,165,100,0.22);
  }
  .subtitle{
    font-size: 13.5px; color: rgba(234,248,231,0.88); font-weight:600; margin-top:6px;
  }

  /* Theme button matching the UI */
  .theme-btn{
    width:48px; height:48px; border-radius:12px; border:1px solid var(--panel-stroke);
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
    color:var(--accent-4); display:grid; place-items:center; cursor:pointer;
    box-shadow: var(--shadow-ui);
    transition: transform .18s ease, background .22s ease, border-color .22s ease, box-shadow .22s ease;
  }
  .theme-btn:hover{ transform: translateY(-2px); background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); }

  /* Panels (visually separated boxes) */
  .panel{
    width:100%;
    background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
    border: 1px solid var(--panel-stroke);
    border-radius: var(--panel-radius);
    box-shadow: var(--shadow-strong);
    backdrop-filter: blur(8px);
  }

  /* Controls section */
  .controls{
    display:flex; flex-direction:column; gap:16px; padding:18px 16px 20px;
  }
  .grid{
    display:grid; gap:14px;
    grid-template-columns: repeat(2, minmax(170px, 1fr));
  }
  .field{
    display:flex; flex-direction:column; gap:8px;
    padding:12px; border-radius:14px; background: rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04);
  }
  label{ font-size:13px; font-weight:800; color:var(--accent-3); }
  input[type=number], select{
    border:1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.08);
    color:var(--accent-4); padding:10px 12px; border-radius: var(--field-radius);
    font-weight:800; font-size:15px; outline:none; transition: border-color .2s, background .2s;
  }
  input[type=number]::placeholder{ color: rgba(234,248,231,.62); }
  input[type=number]:focus, select:focus{ border-color: var(--accent-2); background: rgba(0,0,0,0.12); }

  .row{ display:flex; gap:12px; align-items:center; }
  .row > select{ min-width:160px; }

  .options{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  .toggle{ display:flex; align-items:center; gap:10px; color:var(--accent-3); font-weight:800; cursor:pointer; }
  .switch{ width:52px; height:30px; border-radius:999px; background: rgba(255,255,255,0.06); padding:3px; position:relative; transition: all .24s; border:1px solid rgba(255,255,255,0.09); }
  .switch .knob{ position:absolute; left:3px; top:3px; width:24px; height:24px; border-radius:50%; background:var(--accent-4); box-shadow:0 6px 16px rgba(0,0,0,0.35); transition: transform .2s ease; transform: translateX(0); }
  .switch.on{ background: linear-gradient(90deg, var(--ring-deep), var(--ring-soft)); box-shadow: 0 10px 26px rgba(77,165,100,.22) inset, 0 6px 18px rgba(77,165,100,.24); }
  .switch.on .knob{ transform: translateX(22px); }

  .meta{ display:flex; justify-content:space-between; gap:10px; color:rgba(234,248,231,.88); font-weight:800; }

  .hint{ font-size:12.5px; color:rgba(234,248,231,.78); font-weight:700; }

  /* Visual section */
  .visual{
    padding:18px 14px 22px; display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .circle-wrap{
    width: min(420px, 68vw); height: min(420px, 68vw);
    max-width:420px; max-height:420px; min-width:240px; min-height:240px;
    position:relative; display:grid; place-items:center;
  }

  /* floating bubbles layer (DOM) */
  .bubbles{ position:absolute; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .bubble{
    position:absolute; bottom:-40px; border-radius:50%;
    background: radial-gradient(circle at 30% 30%, rgba(225,255,240,.9), rgba(200,255,235,.35));
    box-shadow: 0 8px 18px rgba(77,165,100,.2);
    filter: blur(.2px); opacity:.22; animation: floatUp linear forwards;
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) scale(.9); opacity:.0; }
    10%{ opacity:.25; }
    90%{ opacity:.18; }
    100%{ transform: translateY(-120%) scale(1.06); opacity:0; }
  }

  .pulse-ring{
    position:absolute; inset:0; border-radius:50%; pointer-events:none; z-index:1;
    border:3px solid rgba(193,230,186,0.10);
    box-shadow: inset 0 18px 60px rgba(2,51,54,0.08), 0 0 40px rgba(77,165,100,.16);
    opacity:.12; transform: scale(.96); transition: transform .42s ease, opacity .42s ease;
  }
  .orbit{
    position:absolute; inset:-22px; border-radius:50%; pointer-events:none; z-index:1;
    box-shadow: 0 0 26px rgba(77,165,100,.25), 0 0 3px rgba(193,230,186,.35);
    animation: orbit 7.2s linear infinite;
    opacity:.76;
  }
  @keyframes orbit { to{ transform: rotate(360deg);} }

  .breath-circle{
    position:relative; z-index:2;
    width: 68%; height: 68%; min-width: 200px; min-height:200px; max-width: 320px; max-height: 320px;
    border-radius:50%;
    display:grid; place-items:center;
    color:var(--accent-4);
    background: radial-gradient(ellipse at 30% 25%, rgba(77,165,100,.22), rgba(2,51,54,.10));
    border: 2px solid rgba(77,165,100,.20);
    box-shadow: 0 18px 60px rgba(2,51,54,.28);
    transition: transform 560ms cubic-bezier(.2,.9,.2,1), box-shadow 360ms;
    will-change: transform;
  }
  .breath-circle.glow{ box-shadow: 0 28px 90px rgba(77,165,100,.32), 0 10px 34px rgba(2,51,54,.26); }

  .phase{ font-size: clamp(16px, 2.4vw, 20px); font-weight:900; color:var(--accent-4); letter-spacing:.3px; }
  .big{ font-size: clamp(36px, 6vw, 54px); font-weight:900; color:var(--accent-1); margin-top:4px; letter-spacing:-.6px; }
  .tiny{ font-size:13px; color:rgba(234,248,231,.88); margin-top:6px; }

  .phrase{
    font-size: clamp(14px, 2.2vw, 18px); font-weight:800; color:white;
    background: linear-gradient(120deg, #4DA564, #028a78);
    padding:10px 16px; border-radius:999px; box-shadow: 0 10px 36px rgba(2,51,54,.20);
    opacity:0; transform: translateY(8px); transition: opacity 260ms, transform 260ms;
  }
  .phrase.show{ opacity:1; transform:none; }

  .actions{ display:flex; gap:12px; align-items:center; justify-content:center; margin-top:6px; }

  .btn{
    border:0; border-radius:44px; padding:14px 28px; font-weight:900; cursor:pointer;
    color:var(--accent-4); background: var(--primary-grad); box-shadow: 0 16px 40px rgba(2,51,54,.22);
    transition: transform .16s ease, box-shadow .22s ease, background .22s ease;
  }
  .btn:hover{ transform: translateY(-4px); box-shadow: 0 24px 56px rgba(2,51,54,.28); }
  .btn.alt{ background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); }
  .btn.alt:hover{ background: rgba(255,255,255,.10); }

  /* Light theme overrides (toggle body.light) */
  body.light{
    color:var(--ink-strong);
    background: radial-gradient(1400px 900px at 20% -12%, #cdeedd 0%, transparent 50%),
                linear-gradient(180deg,#EAF8E7 0%, #F6FFFA 80%);
  }
  body.light .title{ color:#0d3d33; text-shadow:none; }
  body.light .subtitle{ color:#2f6455; }
  body.light .panel{ background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.72)); border-color: rgba(2,51,54,.08); box-shadow: 0 10px 28px rgba(2,51,54,.10); }
  body.light .controls .field{ background: rgba(2,51,54,.04); border-color: rgba(2,51,54,.06); }
  body.light input[type=number], body.light select{ background: #ffffff; color:#0a3a32; border-color: rgba(2,51,54,.18); }
  body.light input[type=number]:focus, body.light select:focus{ border-color:#4DA564; }
  body.light .meta, body.light .tiny{ color:#235a4d; }
  body.light .phrase{ color:#023336; background: linear-gradient(120deg, #b6f0cf, #e4ffee); }
  body.light .breath-circle{ background: radial-gradient(ellipse at 30% 25%, rgba(77,165,100,.28), rgba(2,51,54,.08)); border-color: rgba(2,51,54,.12); box-shadow: 0 18px 60px rgba(2,51,54,.12); }
  body.light .pulse-ring{ border-color: rgba(2,51,54,.14); box-shadow: inset 0 18px 60px rgba(2,51,54,.06); }
  body.light .theme-btn{ color:#0a3a32; }
</style>
</head>
<body class="breathing">
  <!-- background layer -->
  <div class="sky" aria-hidden="true"></div>

  <!-- app -->
  <div class="app" role="application" aria-label="Zenith Breathing App">
    <div class="topbar">
      <div>
        <h1 class="title">Zenith Breathing App</h1>
        <div class="subtitle">A calm, private breathing tool — customize seconds, voice, and beep.</div>
      </div>
      <button id="themeBtn" class="theme-btn" title="Toggle light/dark" aria-label="Toggle theme">🌙</button>
    </div>

    <!-- Controls -->
    <section class="panel controls" aria-label="Controls">
      <div class="grid">
        <div class="field">
          <label for="inhale">Inhale (sec)</label>
          <input id="inhale" type="number" min="0" value="4" />
        </div>
        <div class="field">
          <label for="hold1">Hold after inhale (sec)</label>
          <input id="hold1" type="number" min="0" value="0" />
        </div>
        <div class="field">
          <label for="exhale">Exhale (sec)</label>
          <input id="exhale" type="number" min="0" value="6" />
        </div>
        <div class="field">
          <label for="hold2">Hold after exhale (sec)</label>
          <input id="hold2" type="number" min="0" value="0" />
        </div>
      </div>

      <div style="margin-top:6px;">
        <label for="total" style="font-size:13px; font-weight:900; color:var(--accent-3);">Total time</label>
        <div class="row">
          <select id="total" aria-label="Total session length">
            <option value="60">1 minute</option>
            <option value="120" selected>2 minutes</option>
            <option value="300">5 minutes</option>
            <option value="600">10 minutes</option>
            <option value="-1">Repeat indefinitely</option>
          </select>
          <input id="customTotal" type="number" min="10" placeholder="Custom sec (optional)" style="flex:1;" />
        </div>
      </div>

      <div class="options" role="group" aria-label="Options">
        <div id="beepToggle" class="toggle" role="button" aria-pressed="true" tabindex="0">
          <span>Beep</span>
          <div class="switch on"><div class="knob"></div></div>
        </div>
        <div id="voiceToggle" class="toggle" role="button" aria-pressed="false" tabindex="0">
          <span>Voice</span>
          <div class="switch"><div class="knob"></div></div>
        </div>
      </div>

      <div class="meta" aria-live="polite">
        <div>Status: <strong id="status">stopped</strong></div>
        <div>Cycle length: <strong id="cycleLen">0s</strong></div>
      </div>

      <div class="hint">Tip: press <strong>Space</strong> to Start/Pause, and <strong>R</strong> to Reset.</div>
    </section>

    <!-- Visual -->
    <section class="panel visual" aria-label="Breathing visual">
      <div class="circle-wrap" id="circleWrap">
        <!-- ambient effects -->
        <div class="bubbles" id="bubbles"></div>
        <canvas id="trail" class="trail" style="position:absolute; inset:0; z-index:1; pointer-events:none;"></canvas>

        <div id="pulse" class="pulse-ring" aria-hidden="true"></div>
        <div class="orbit" aria-hidden="true"></div>

        <div id="circle" class="breath-circle" role="img" aria-label="Breathing circle">
          <div style="text-align:center;">
            <div class="phase" id="phase">—</div>
            <div class="big" id="phaseTime">0s</div>
            <div class="tiny">Total left: <span id="totalTime">0s</span></div>
          </div>
        </div>
      </div>

      <div class="phrase" id="phrase">Welcome — set your timings and press Start</div>

      <div class="actions">
        <button id="startBtn" class="btn" aria-pressed="false">Start</button>
        <button id="pauseBtn" class="btn alt" title="Pause/resume">Pause</button>
        <button id="resetBtn" class="btn alt" title="Reset (R)">Reset</button>
      </div>
    </section>
  </div>

<script>
(() => {
  /* Elements */
  const themeBtn = document.getElementById('themeBtn');

  const inhaleEl = document.getElementById('inhale');
  const hold1El  = document.getElementById('hold1');
  const exhaleEl = document.getElementById('exhale');
  const hold2El  = document.getElementById('hold2');
  const totalSel = document.getElementById('total');
  const customTotalEl = document.getElementById('customTotal');

  const beepToggle  = document.getElementById('beepToggle');
  const voiceToggle = document.getElementById('voiceToggle');

  const statusEl = document.getElementById('status');
  const cycleLenEl = document.getElementById('cycleLen');
  const phaseEl = document.getElementById('phase');
  const phaseTimeEl = document.getElementById('phaseTime');
  const totalTimeEl = document.getElementById('totalTime');

  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');

  const circle = document.getElementById('circle');
  const pulse  = document.getElementById('pulse');
  const phrase = document.getElementById('phrase');

  const circleWrap = document.getElementById('circleWrap');
  const trailCanvas = document.getElementById('trail');
  const bubblesBox  = document.getElementById('bubbles');

  /* State */
  let beepOn = true;
  let voiceOn = false;

  let timerInterval = null;
  let startTS = null;
  let pauseOffset = 0;
  let endTS = null;
  let lastPhaseIndex = -1;

  // Audio chime
  let audioCtx = null;
  function chime(){
    if(!beepOn) return;
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const now = audioCtx.currentTime;
      const o1 = audioCtx.createOscillator();
      const o2 = audioCtx.createOscillator();
      const g  = audioCtx.createGain();
      const f  = audioCtx.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = 2200;
      o1.type='sine'; o2.type='sine';
      o1.frequency.value = 880; o2.frequency.value = 1320;
      o1.connect(g); o2.connect(g); g.connect(f); f.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.08, now + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 1.0);
      o1.start(now); o2.start(now);
      o1.stop(now + 1.02); o2.stop(now + 1.02);
    }catch(e){ /* ignore */ }
  }

  // Speech
  const synth = window.speechSynthesis;
  function speak(text){
    if(!voiceOn) return;
    if(!('speechSynthesis' in window)) return;
    try{
      synth.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US'; u.rate = 0.95; u.pitch = 1;
      synth.speak(u);
    }catch(e){ /* ignore */ }
  }

  // Read settings
  function readSettings(){
    const inh = Math.max(0, Number(inhaleEl.value) || 0);
    const h1  = Math.max(0, Number(hold1El.value) || 0);
    const exh = Math.max(0, Number(exhaleEl.value) || 0);
    const h2  = Math.max(0, Number(hold2El.value) || 0);
    let total = Number(totalSel.value);
    const custom = Number(customTotalEl.value) || 0;
    if(custom >= 10) total = custom;
    return { inh, h1, exh, h2, total };
  }

  function fmt(s){
    s = Math.max(0, Math.round(s));
    if(s < 60) return s + 's';
    return Math.floor(s/60) + 'm ' + (s%60) + 's';
  }

  function updateCycleDisplay(len){
    cycleLenEl.textContent = Math.round(len) + 's';
    // sync background slow shift with whole cycle length
    if(len > 0){
      document.documentElement.style.setProperty('--breath-duration', Math.max(4, Math.round(len)) + 's');
      document.body.classList.add('breathing');
    }
  }

  // Phrase
  function showPhrase(phaseName){
    const map = { Inhale:'Inhale deeply…', Hold:'Hold gently…', Exhale:'Exhale slowly…' };
    phrase.classList.remove('show');
    setTimeout(()=>{ phrase.textContent = (map[phaseName] || 'Hold gently…'); phrase.classList.add('show'); }, 120);
  }

  /* Particle trail (canvas) */
  let ctx, pxW=0, pxH=0;
  const particles = [];
  function resizeCanvas(){
    const r = circleWrap.getBoundingClientRect();
    pxW = Math.floor(r.width);
    pxH = Math.floor(r.height);
    trailCanvas.width = pxW;
    trailCanvas.height = pxH;
    ctx = trailCanvas.getContext('2d');
  }
  window.addEventListener('resize', resizeCanvas, {passive:true});
  resizeCanvas();

  function spawnParticles(){
    // Emit near circle perimeter
    const rect = circleWrap.getBoundingClientRect();
    const size = Math.min(rect.width, rect.height) * 0.34; // circle radius approx
    for(let i=0;i<4;i++){
      const a = Math.random()*Math.PI*2;
      const r = size + (Math.random()*10-5);
      const x = pxW/2 + Math.cos(a)*r;
      const y = pxH/2 + Math.sin(a)*r;
      const sp = 0.6 + Math.random()*1.2;
      particles.push({
        x, y,
        vx: Math.cos(a)*sp*0.6 + (Math.random()-.5)*0.3,
        vy: Math.sin(a)*sp*0.6 + (Math.random()-.5)*0.3,
        life: 38 + Math.random()*22,
        color: 'rgba(197, 245, 221, '
      });
    }
  }

  function animateTrail(){
    if(!ctx) return requestAnimationFrame(animateTrail);
    // fade the previous frame slightly
    ctx.fillStyle = 'rgba(0, 0, 0, 0.10)';
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillRect(0,0,pxW,pxH);
    ctx.globalCompositeOperation = 'lighter';

    // update/draw particles
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.98; p.vy *= 0.98;
      p.life -= 1;
      const alpha = Math.max(0, p.life/60);
      ctx.fillStyle = p.color + alpha + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.4 + (1-alpha)*1.2, 0, Math.PI*2);
      ctx.fill();
      if(p.life <= 0) particles.splice(i,1);
    }
    requestAnimationFrame(animateTrail);
  }
  animateTrail();

  // Floating bubbles (DOM)
  function spawnBubble(){
    const b = document.createElement('div');
    b.className='bubble';
    const s = 6 + Math.random()*16;
    b.style.width = s+'px'; b.style.height = s+'px';
    b.style.left = (Math.random()*88+6)+'%';
    b.style.animationDuration = (6 + Math.random()*6)+'s';
    bubblesBox.appendChild(b);
    setTimeout(()=> b.remove(), 13000);
  }
  setInterval(spawnBubble, 900);

  /* Timer logic */
  function startTimer(){
    const s = readSettings();
    const cycleLength = s.inh + s.h1 + s.exh + s.h2;
    if(cycleLength <= 0){ alert('Set at least one positive phase length.'); return; }
    updateCycleDisplay(cycleLength);

    startTS = Date.now() - pauseOffset;
    endTS = (s.total === -1) ? Infinity : startTS + s.total*1000;
    statusEl.textContent = 'running';
    startBtn.textContent = 'Stop';
    startBtn.setAttribute('aria-pressed','true');
    circle.classList.add('glow');
    phrase.classList.add('show');

    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(tick, 120);

    try{ audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
    tick();
  }

  function pauseTimer(){
    if(!startTS) return;
    pauseOffset = Date.now() - startTS;
    statusEl.textContent = 'paused';
    if(timerInterval) clearInterval(timerInterval);
    synth.cancel();
    pulse.style.opacity = 0.08;
  }

  function stopTimer(){
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    startTS = null; endTS = null; pauseOffset = 0; lastPhaseIndex = -1;
    statusEl.textContent = 'stopped';
    startBtn.textContent = 'Start';
    startBtn.setAttribute('aria-pressed','false');
    phaseEl.textContent = '—';
    phaseTimeEl.textContent = '0s';
    totalTimeEl.textContent = '0s';
    phrase.textContent = 'Welcome — set your timings and press Start';
    phrase.classList.remove('show');
    circle.style.transform = 'scale(.95)';
    circle.classList.remove('glow');
    pulse.style.opacity = .12;
    chime();
  }

  function tick(){
    const s = readSettings();
    const phases = [
      {name:'Inhale', len: s.inh},
      {name:'Hold',   len: s.h1},
      {name:'Exhale', len: s.exh},
      {name:'Hold',   len: s.h2}
    ];
    const cycleLength = phases.reduce((a,b)=>a+b.len,0);
    if(cycleLength <= 0){ stopTimer(); return; }

    const now = Date.now();
    const elapsed = (now - startTS)/1000;
    const totalLeft = (endTS === Infinity) ? Infinity : Math.max(0, Math.round((endTS - now)/1000));

    let t = elapsed % cycleLength;
    let idx = 0;
    for(let i=0;i<phases.length;i++){
      if(t <= phases[i].len){ idx = i; break; }
      t -= phases[i].len;
      if(i === phases.length-1) idx = phases.length-1;
    }
    const cur = phases[idx];
    const left = Math.max(0, cur.len - t);

    // phase change
    if(idx !== lastPhaseIndex){
      chime();
      speak(cur.name);
      showPhrase(cur.name);
      lastPhaseIndex = idx;
    }

    // texts
    phaseEl.textContent = cur.name;
    phaseTimeEl.textContent = Math.ceil(left)+'s';
    totalTimeEl.textContent = (totalLeft===Infinity) ? '— (indefinite)' : fmt(totalLeft);

    // visuals (exactly sync scale progression)
    let scale = .95;
    if(cur.name === 'Inhale'){
      const prog = cur.len ? (1 - left/cur.len) : 1;
      scale = 0.82 + 0.38*prog;
      pulse.style.transform = `scale(${0.98 + 0.28*prog})`;
      pulse.style.opacity   = (0.10 + 0.18*prog);
      spawnParticles();
    }else if(cur.name === 'Exhale'){
      const prog = cur.len ? (1 - left/cur.len) : 1;
      scale = 1.06 - 0.32*prog;
      pulse.style.transform = `scale(${1.08 - 0.28*prog})`;
      pulse.style.opacity   = (0.10 + 0.12*prog);
      spawnParticles();
    }else{
      scale = 0.92 + 0.06*Math.sin(performance.now()/380);
      pulse.style.transform = 'scale(.96)';
      pulse.style.opacity = .12;
    }
    circle.style.transform = `scale(${scale.toFixed(3)})`;

    // finish
    if(totalLeft !== Infinity && totalLeft <= 0){
      clearInterval(timerInterval); timerInterval = null; startTS = null;
      statusEl.textContent = 'finished';
      startBtn.textContent = 'Start';
      chime();
      speak('Session finished');
      circle.classList.remove('glow');
      pulse.style.opacity = .12;
      phrase.classList.remove('show');
    }
  }

  /* UI bindings */
  startBtn.addEventListener('click', ()=>{
    if(statusEl.textContent === 'running'){ stopTimer(); }
    else if(statusEl.textContent === 'paused'){ startTimer(); }
    else { pauseOffset = 0; startTimer(); }
  });
  pauseBtn.addEventListener('click', ()=>{
    if(statusEl.textContent === 'running') pauseTimer();
    else if(statusEl.textContent === 'paused') startTimer();
  });
  resetBtn.addEventListener('click', stopTimer);

  // toggles
  function setSwitch(el, on){
    const sw = el.querySelector('.switch');
    el.setAttribute('aria-pressed', on?'true':'false');
    if(on) sw.classList.add('on'); else sw.classList.remove('on');
  }
  setSwitch(beepToggle, true);
  setSwitch(voiceToggle,false);

  beepToggle.addEventListener('click', ()=>{ beepOn=!beepOn; setSwitch(beepToggle,beepOn); });
  voiceToggle.addEventListener('click', ()=>{ voiceOn=!voiceOn; setSwitch(voiceToggle,voiceOn); if(!voiceOn) synth.cancel(); });

  // keyboard
  window.addEventListener('keydown', e=>{
    if(e.key===' '){ e.preventDefault(); startBtn.click(); }
    if(e.key==='r' || e.key==='R'){ e.preventDefault(); resetBtn.click(); }
  });

  // inputs update cycle length display
  [inhaleEl,hold1El,exhaleEl,hold2El].forEach(el=> el.addEventListener('input', ()=>{
    const s = readSettings(); updateCycleDisplay(s.inh+s.h1+s.exh+s.h2);
  }));
  totalSel.addEventListener('change', ()=> customTotalEl.value='');

  // theme
  let isLight = false;
  themeBtn.addEventListener('click', ()=>{
    isLight=!isLight;
    document.body.classList.toggle('light', isLight);
    themeBtn.textContent = isLight ? '☀️' : '🌙';
  });

  // init
  const s0 = readSettings();
  updateCycleDisplay(s0.inh + s0.h1 + s0.exh + s0.h2);
  setTimeout(()=> startBtn.focus({preventScroll:true}), 700);

  // reduced motion
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    document.querySelectorAll('.breath-circle,.pulse-ring,.orbit,.sky').forEach(el=> el.style.animation='none');
  }
})();
</script>
</body>
</html>
