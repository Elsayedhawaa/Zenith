<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zenith — Breathing App</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-a: #012421;
      --bg-b: #003733;
      --accent-1: #023336;
      --accent-2: #4DA564;
      --accent-3: #C1E6BA;
      --text-light: #EAF8E7;
      --muted: rgba(234,248,231,0.78);
      --card-bg: rgba(255,255,255,0.02);
      --glass: rgba(255,255,255,0.02);
      --breath-duration: 8s; /* overridden by JS */
      --max-page-width: 1200px;
    }

    /* base */
    html,body{height:100%; margin:0; font-family:'Poppins',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;}
    body{
      min-height:100vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:28px;
      background: linear-gradient(120deg,var(--bg-a), var(--bg-b));
      color:var(--text-light);
      transition: background 600ms ease, color 400ms ease;
      overflow-y:auto;
    }

    /* breathing background subtle shift synced by --breath-duration */
    @keyframes bgBreath {
      0% { filter: hue-rotate(0deg) brightness(1); }
      50% { filter: hue-rotate(6deg) brightness(1.03); }
      100% { filter: hue-rotate(0deg) brightness(1); }
    }
    body.breathing { animation: bgBreath var(--breath-duration) linear infinite; }

    /* full-width page layout (left controls, right visual) */
    .page {
      width:100%;
      max-width:var(--max-page-width);
      display:grid;
      grid-template-columns: 1fr 520px;
      gap:28px;
      align-items:start;
      box-sizing:border-box;
    }

    /* star canvas covers background full width (z-index behind everything) */
    #starCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      filter: blur(0.6px);
    }

    /* panel look for the left side (controls) */
    .panel {
      position: relative;
      z-index: 2;
      padding:20px;
      border-radius:14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      backdrop-filter: blur(6px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    }

    .controls {
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .brand {
      display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
    }
    .title {
      font-size:22px; font-weight:800; color:var(--text-light);
    }
    .subtitle { font-size:13px; color:var(--muted); margin-top:6px; font-weight:600; }

    /* theme toggle */
    .theme-toggle {
      background:transparent; border:1px solid rgba(255,255,255,0.06);
      width:46px; height:46px; border-radius:10px; display:grid; place-items:center; cursor:pointer; color:var(--text-light);
      transition: transform 180ms, background 180ms; font-size:20px;
    }
    .theme-toggle:hover { transform:scale(1.05); }

    /* settings grid: separated boxes */
    .settings-grid {
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:14px;
      margin-top:6px;
    }

    .setting-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.008));
      border-radius:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,0.03);
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    label { display:block; font-weight:700; font-size:13px; color:var(--accent-3); margin-bottom:8px; }
    input[type=number], select {
      width:100%; padding:10px 12px; border-radius:10px; background:transparent; color:var(--text-light);
      border:1px solid rgba(255,255,255,0.04); font-weight:700; font-size:15px;
    }

    .total-row { display:flex; gap:12px; align-items:center; margin-top:10px; }
    .total-row select { width:170px; flex:0 0 170px; padding:10px 12px; border-radius:10px; }
    .total-row input.custom { flex:1; padding:10px 12px; border-radius:10px; }

    /* options as separate pills */
    .options { display:flex; gap:18px; margin-top:12px; align-items:center; }
    .option-card { background:var(--card-bg); padding:8px 12px; border-radius:999px; display:flex; gap:12px; align-items:center; border:1px solid rgba(255,255,255,0.03); }
    .toggle { display:flex; gap:8px; align-items:center; cursor:pointer; user-select:none; font-weight:700; color:var(--accent-3); }
    .switch { width:48px; height:28px; border-radius:999px; background: rgba(255,255,255,0.06); padding:3px; display:flex; align-items:center; position:relative; transition:all 220ms; }
    .switch.on { background: linear-gradient(90deg,var(--accent-1),var(--accent-2)); box-shadow: 0 6px 20px rgba(2,51,54,0.18); }
    .knob { width:20px; height:20px; border-radius:50%; background:var(--text-light); transform:translateX(0); transition:transform 200ms ease; box-shadow:0 6px 14px rgba(0,0,0,0.35); }
    .switch.on .knob { transform:translateX(20px); }

    .meta-row { display:flex; justify-content:space-between; margin-top:12px; color:var(--muted); font-weight:700; }

    .hint { margin-top:10px; color:rgba(234,248,231,0.7); font-weight:600; }

    /* VISUAL column */
    .visual-column { z-index:2; display:flex; align-items:center; justify-content:center; min-height:520px; }
    .visual-box {
      width:100%; max-width:520px; display:flex; flex-direction:column; align-items:center; gap:14px;
    }

    .circle-wrap { width:360px; height:360px; display:grid; place-items:center; position:relative; }
    .pulse-ring {
      position:absolute; width:100%; height:100%; border-radius:50%;
      border:3px solid rgba(77,165,100,0.08); box-shadow: inset 0 18px 60px rgba(2,51,54,0.06);
      opacity:0.12; transition: transform 360ms, opacity 360ms;
    }
    .orbit {
      position:absolute; width:420px; height:420px; border-radius:50%; box-shadow:0 0 40px rgba(2,51,54,0.04); opacity:0.55; pointer-events:none;
    }

    .breath-circle {
      width:260px; height:260px; border-radius:50%; display:grid; place-items:center; color:white; font-weight:800;
      background: radial-gradient(circle at 30% 20%, rgba(77,165,100,0.14), rgba(2,51,54,0.04));
      border:2px solid rgba(77,165,100,0.12);
      box-shadow: 0 18px 60px rgba(2,51,54,0.28);
      transition: transform 520ms cubic-bezier(.2,.9,.2,1), box-shadow 360ms;
      will-change: transform;
    }
    .breath-circle.glow { box-shadow: 0 28px 90px rgba(77,165,100,0.28), 0 6px 28px rgba(2,51,54,0.22); }

    .phase-label {
      font-family: 'Roboto Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;
      font-size:18px; font-weight:700; color:var(--text-light); letter-spacing:0.6px;
    }
    .phase-time { font-size:44px; font-weight:900; color:var(--accent-1); margin-top:6px; }

    .small { color:var(--muted); margin-top:8px; font-weight:700; }

    .phrase {
      font-weight:700; font-size:15px; padding:10px 18px; border-radius:999px;
      background: linear-gradient(90deg,var(--accent-2), rgba(2,131,116,0.85));
      color:white; box-shadow: 0 10px 36px rgba(2,51,54,0.18);
      opacity:0; transform:translateY(8px); transition:opacity 260ms, transform 260ms;
    }
    .phrase.show { opacity:1; transform:none; }

    .start-area { display:flex; flex-direction:column; gap:12px; align-items:center; margin-top:6px; }
    .start-btn {
      background: linear-gradient(135deg,var(--accent-2), #028a78);
      padding:16px 44px; border-radius:44px; font-weight:900; border:0; color:var(--text-light); cursor:pointer;
      font-size:18px; box-shadow:0 18px 48px rgba(2,51,54,0.2); transition:transform 160ms;
    }
    .start-btn:hover { transform:translateY(-4px); }

    .secondary-row { display:flex; gap:14px; align-items:center; }
    .muted-btn { padding:12px 26px; border-radius:28px; border:0; font-weight:800; cursor:pointer; background: rgba(255,255,255,0.04); color:var(--text-light); }

    /* particle canvas & bubbles overlay */
    #particleCanvas { position:absolute; inset:0; z-index:1; pointer-events:none; }

    /* responsive */
    @media (max-width:1100px){
      .page { grid-template-columns: 1fr; gap:18px; padding:18px; }
      .visual-column { order:-1; }
      .circle-wrap { width:300px; height:300px; }
      .breath-circle { width:220px; height:220px; }
    }
  </style>
</head>
<body class="breathing">

  <!-- star canvas behind everything -->
  <canvas id="starCanvas" aria-hidden="true"></canvas>

  <div class="page" role="application" aria-label="Zenith Breathing App">

    <!-- LEFT: controls -->
    <div class="panel controls" aria-label="Controls panel">
      <div class="brand">
        <div>
          <div class="title">Zenith Breathing App</div>
          <div class="subtitle">A calm, private breathing tool — customize inhale/hold/exhale/hold, voice & beep.</div>
        </div>
        <button id="themeToggle" class="theme-toggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
      </div>

      <div class="settings-grid" role="form" aria-label="Breathing settings">
        <div class="setting-card">
          <label for="inhale">Inhale (sec)</label>
          <input id="inhale" type="number" min="0" value="4" />
        </div>

        <div class="setting-card">
          <label for="hold1">Hold after inhale (sec)</label>
          <input id="hold1" type="number" min="0" value="0" />
        </div>

        <div class="setting-card">
          <label for="exhale">Exhale (sec)</label>
          <input id="exhale" type="number" min="0" value="6" />
        </div>

        <div class="setting-card">
          <label for="hold2">Hold after exhale (sec)</label>
          <input id="hold2" type="number" min="0" value="0" />
        </div>
      </div>

      <div style="margin-top:12px;" aria-label="Total time controls">
        <label for="total" style="font-weight:800; color:var(--accent-3)">Total time</label>
        <div class="total-row" role="group">
          <select id="total">
            <option value="60">1 minute</option>
            <option value="120" selected>2 minutes</option>
            <option value="300">5 minutes</option>
            <option value="600">10 minutes</option>
            <option value="-1">Repeat indefinitely</option>
          </select>
          <input id="customTotal" class="custom" type="number" min="10" placeholder="Custom sec (optional)" />
        </div>
      </div>

      <div class="options" role="group" aria-label="Options toggles">
        <div class="option-card">
          <div id="beepToggle" class="toggle" role="button" aria-pressed="true" tabindex="0">
            <span>Beep</span>
            <div class="switch on"><div class="knob"></div></div>
          </div>
        </div>

        <div class="option-card">
          <div id="voiceToggle" class="toggle" role="button" aria-pressed="false" tabindex="0">
            <span>Voice</span>
            <div class="switch"><div class="knob"></div></div>
          </div>
        </div>

      </div>

      <div class="meta-row" aria-live="polite">
        <div>Status: <strong id="status">stopped</strong></div>
        <div>Cycle length: <strong id="cycleLen">0s</strong></div>
      </div>

      <div class="hint">Tip: press <strong>Space</strong> to Start/Pause, and <strong>R</strong> to Reset.</div>
    </div>

    <!-- RIGHT: visual -->
    <div class="visual-column">
      <div class="visual-box panel" style="display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; position:relative; overflow:visible;">
        <!-- particle canvas sits above stars but behind UI -->
        <canvas id="particleCanvas" aria-hidden="true"></canvas>

        <div class="circle-wrap" aria-hidden="false">
          <div id="pulse" class="pulse-ring"></div>
          <div class="orbit" aria-hidden="true"></div>
          <div id="circle" class="breath-circle" role="img" aria-label="Breathing circle" tabindex="0">
            <div style="text-align:center;">
              <div class="phase-label" id="phase">—</div>
              <div class="phase-time" id="phaseTime">0s</div>
              <div style="height:10px;"></div>
              <div class="small">Total left: <span id="totalTime">0s</span></div>
            </div>
          </div>
        </div>

        <div class="phrase" id="phrase">Welcome — set your timings and press Start</div>

        <div class="start-area" style="width:100%; align-items:center;">
          <button id="startBtn" class="start-btn" aria-pressed="false">Start</button>
          <div class="secondary-row" style="margin-top:6px;">
            <button id="pauseBtn" class="muted-btn" title="Pause/resume">Pause</button>
            <button id="resetBtn" class="muted-btn" title="Reset (R)">Reset</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    /* ---------- Setup canvases for stars + particles ---------- */
    const starCanvas = document.getElementById('starCanvas');
    const particleCanvas = document.getElementById('particleCanvas');
    const starCtx = starCanvas.getContext?.('2d');
    const pCtx = particleCanvas.getContext?.('2d');

    function resizeCanvases(){
      starCanvas.width = innerWidth; starCanvas.height = innerHeight;
      particleCanvas.width = document.querySelector('.visual-box').clientWidth;
      particleCanvas.height = document.querySelector('.visual-box').clientHeight;
      // position particle canvas inside visual-box
      const vb = document.querySelector('.visual-box').getBoundingClientRect();
      particleCanvas.style.left = (vb.left) + 'px';
      particleCanvas.style.top = (vb.top) + 'px';
      particleCanvas.style.width = vb.width + 'px';
      particleCanvas.style.height = vb.height + 'px';
      particleCanvas.width = vb.width * devicePixelRatio;
      particleCanvas.height = vb.height * devicePixelRatio;
      particleCanvas.style.transform = `scale(${1 / devicePixelRatio})`;
      particleCanvas.getContext('2d')?.scale(devicePixelRatio, devicePixelRatio);
    }
    window.addEventListener('resize', () => { resizeCanvases(); drawStars(); });

    // create twinkling stars
    let stars = [];
    function initStars(){
      stars = [];
      const count = Math.round((innerWidth * innerHeight) / 80000); // scale by area
      for(let i=0;i<count;i++){
        stars.push({
          x: Math.random()*innerWidth,
          y: Math.random()*innerHeight,
          r: Math.random()*1.2 + 0.3,
          alpha: Math.random()*0.6 + 0.2,
          twinkle: Math.random()*2 + 1,
          phase: Math.random()*Math.PI*2
        });
      }
    }
    function drawStars(){
      if(!starCtx) return;
      starCtx.clearRect(0,0,starCanvas.width, starCanvas.height);
      const t = performance.now() / 1000;
      for(const s of stars){
        const a = s.alpha * (0.6 + 0.4*Math.sin(t * s.twinkle + s.phase));
        starCtx.beginPath();
        starCtx.fillStyle = `rgba(230, 250, 240, ${a})`;
        starCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        starCtx.fill();
      }
    }

    // particles & bubbles behind UI (particle trails near the circle)
    let particles = [];
    function spawnParticle(x,y){
      particles.push({
        x, y,
        vx: (Math.random()-0.5)*0.6,
        vy: -Math.random()*0.6 - 0.2,
        life: Math.random()*1400 + 900,
        start: performance.now(),
        r: Math.random()*5 + 2,
        alpha: Math.random()*0.6 + 0.15
      });
    }
    function spawnBubble(x, y){
      particles.push({
        x, y,
        vx: (Math.random()-0.5)*0.4,
        vy: -(Math.random()*0.2 + 0.05),
        life: Math.random()*2200 + 1600,
        start: performance.now(),
        r: Math.random()*12 + 8,
        alpha: 0.08,
        bubble:true
      });
    }

    function updateParticles(){
      if(!pCtx) return;
      const now = performance.now();
      pCtx.clearRect(0,0,particleCanvas.width, particleCanvas.height);
      const vb = document.querySelector('.visual-box').getBoundingClientRect();
      for(let i=particles.length-1;i>=0;i--){
        const p = particles[i];
        const age = now - p.start;
        if(age > p.life){ particles.splice(i,1); continue; }
        const t = age / p.life;
        p.x += p.vx * (1 + 0.2*Math.sin(now/300));
        p.y += p.vy * (1 + 0.1*Math.cos(now/200));
        const alpha = p.bubble ? p.alpha * (1 - t) : p.alpha * (1 - t);
        pCtx.beginPath();
        if(p.bubble){
          pCtx.fillStyle = `rgba(255,255,255,${alpha})`;
          pCtx.globalCompositeOperation = 'lighter';
          pCtx.arc((p.x - vb.left), (p.y - vb.top), p.r, 0, Math.PI*2);
          pCtx.fill();
          pCtx.globalCompositeOperation = 'source-over';
        } else {
          pCtx.fillStyle = `rgba(255,255,255,${alpha})`;
          pCtx.beginPath();
          pCtx.arc((p.x - vb.left), (p.y - vb.top), p.r, 0, Math.PI*2);
          pCtx.fill();
        }
      }
    }

    // animation loops
    function startAnimationLoops(){
      let last = performance.now();
      function frame(){
        const now = performance.now();
        // twinkle
        drawStars();
        // particles
        updateParticles();
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    // initialize
    function initVisuals(){
      resizeCanvases();
      initStars();
      drawStars();
      startAnimationLoops();
      // spawn some ambient bubbles periodically
      setInterval(()=>{
        const vb = document.querySelector('.visual-box').getBoundingClientRect();
        spawnBubble(vb.left + Math.random()*vb.width, vb.top + vb.height - 10);
      }, 1500);
    }

    // wait for layout then init canvas sizes
    window.addEventListener('load', () => { initVisuals(); });

    /* ---------- App logic: timers, UI, voice, chime ---------- */
    (function(){
      // elements
      const inhaleEl = document.getElementById('inhale');
      const hold1El = document.getElementById('hold1');
      const exhaleEl = document.getElementById('exhale');
      const hold2El = document.getElementById('hold2');
      const totalSelect = document.getElementById('total');
      const customTotalEl = document.getElementById('customTotal');

      const beepToggle = document.getElementById('beepToggle');
      const voiceToggle = document.getElementById('voiceToggle');

      const statusEl = document.getElementById('status');
      const cycleLenEl = document.getElementById('cycleLen');
      const phaseLabel = document.getElementById('phase');
      const phaseTime = document.getElementById('phaseTime');
      const totalTimeEl = document.getElementById('totalTime');

      const startBtn = document.getElementById('startBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const resetBtn = document.getElementById('resetBtn');

      const circle = document.getElementById('circle');
      const pulse = document.getElementById('pulse');
      const phraseEl = document.getElementById('phrase');
      const pageEl = document.body;
      const themeToggle = document.getElementById('themeToggle');

      // state
      let beepOn = true;
      let voiceOn = false;
      let timerInterval = null;
      let startTS = null;
      let paused = false;
      let pauseOffset = 0;
      let endTS = null;
      let lastPhaseIndex = -1;

      // audio chime
      let audioCtx = null;
      function playChime(){
        if(!beepOn) return;
        try{
          audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          const now = audioCtx.currentTime;
          const o1 = audioCtx.createOscillator();
          const o2 = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          const filt = audioCtx.createBiquadFilter();
          filt.type = 'lowpass'; filt.frequency.value = 2200;
          o1.type='sine'; o2.type='sine';
          o1.frequency.value = 880; o2.frequency.value = 1320;
          o1.connect(g); o2.connect(g); g.connect(filt); filt.connect(audioCtx.destination);
          g.gain.setValueAtTime(0.0001, now);
          g.gain.exponentialRampToValueAtTime(0.06, now + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0002, now + 1.0);
          o1.start(now); o2.start(now);
          o1.stop(now + 0.95); o2.stop(now + 0.95);
        } catch(e){ console.warn('Audio error', e); }
      }

      // speech
      const synth = window.speechSynthesis;
      function speak(text){
        if(!voiceOn) return;
        if(!('speechSynthesis' in window)) return;
        try{
          synth.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.lang = 'en-US';
          u.rate = 0.95;
          synth.speak(u);
        } catch(e){ console.warn('Speech error', e); }
      }

      // helpers
      function readSettings(){
        const inh = Math.max(0, Number(inhaleEl.value) || 0);
        const h1  = Math.max(0, Number(hold1El.value) || 0);
        const exh = Math.max(0, Number(exhaleEl.value) || 0);
        const h2  = Math.max(0, Number(hold2El.value) || 0);
        let total = Number(totalSelect.value);
        const custom = Number(customTotalEl.value) || 0;
        if(custom >= 10) total = custom;
        return {inh,h1,exh,h2,total};
      }

      function formatSec(s){
        s = Math.max(0, Math.round(s));
        if(s < 60) return s + 's';
        const m = Math.floor(s/60); const sec = s%60;
        return `${m}m ${sec}s`;
      }

      function updateCycleLen(len){
        cycleLenEl.textContent = `${Math.round(len)}s`;
      }

      const phraseMap = { Inhale:'Inhale deeply…', Hold:'Hold gently…', Exhale:'Exhale slowly…' };
      function showPhrase(phaseName){
        const text = phraseMap[phaseName] || 'Hold…';
        phraseEl.classList.remove('show');
        setTimeout(()=>{ phraseEl.textContent = text; phraseEl.classList.add('show'); }, 120);
      }

      // spawn small particles at circle edge for trail
      function spawnTrail(){
        const rect = document.querySelector('.circle-wrap').getBoundingClientRect();
        const angle = Math.random()*Math.PI*2;
        const x = rect.left + rect.width/2 + Math.cos(angle) * (rect.width/4);
        const y = rect.top + rect.height/2 + Math.sin(angle) * (rect.height/4);
        spawnParticle(x, y);
      }

      // main tick
      function tick(){
        const s = readSettings();
        const phases = [{name:'Inhale', len:s.inh},{name:'Hold', len:s.h1},{name:'Exhale', len:s.exh},{name:'Hold', len:s.h2}];
        const cycleLength = phases.reduce((a,b)=>a+b.len,0);
        if(cycleLength <= 0){ stopTimer(); return; }
        updateCycleLen(cycleLength);

        const now = Date.now();
        const elapsed = (now - startTS) / 1000.0;
        const totalLeft = (endTS === Infinity) ? Infinity : Math.max(0, Math.round((endTS - now)/1000));
        let cycleElapsed = elapsed % cycleLength;
        if(elapsed < 0) cycleElapsed = 0;

        // find phase
        let phaseIndex = 0; let t = cycleElapsed;
        for(let i=0;i<phases.length;i++){
          if(t <= phases[i].len){ phaseIndex = i; break; }
          t -= phases[i].len;
          if(i === phases.length-1) phaseIndex = phases.length-1;
        }
        const current = phases[phaseIndex];
        const phaseLeft = Math.max(0, current.len - t);

        // phase change
        if(phaseIndex !== lastPhaseIndex){
          playChime();
          if(voiceOn) speak(current.name);
          showPhrase(current.name);
          lastPhaseIndex = phaseIndex;
          // spawn a small burst of particles when phase switches
          for(let k=0;k<6;k++) spawnTrail();
        }

        // speak countdown 3..2..1
        if(voiceOn && phaseLeft <= 3 && phaseLeft >= 1){
          speak(String(Math.ceil(phaseLeft)));
        }

        // update texts
        phaseLabel.textContent = current.name;
        phaseTime.textContent = Math.ceil(phaseLeft) + 's';
        totalTimeEl.textContent = (totalLeft === Infinity) ? '— (indefinite)' : formatSec(totalLeft);

        // visuals: circle scale & pulse
        let targetScale = 0.95;
        if(current.name === 'Inhale'){
          const progress = current.len > 0 ? (1 - (phaseLeft / current.len)) : 1;
          targetScale = 0.82 + 0.38 * progress; // grows
          pulse.style.transform = `scale(${0.98 + 0.28*progress})`;
          pulse.style.opacity = (0.06 + 0.18*progress);
        } else if(current.name === 'Exhale'){
          const progress = current.len > 0 ? (1 - (phaseLeft / current.len)) : 1;
          targetScale = 1.06 - 0.32 * progress; // shrinks
          pulse.style.transform = `scale(${1.08 - 0.28*progress})`;
          pulse.style.opacity = (0.06 + 0.12*progress);
        } else {
          targetScale = 0.92 + 0.06 * Math.sin(performance.now()/400);
          pulse.style.transform = `scale(0.95)`;
          pulse.style.opacity = 0.12;
        }
        circle.style.transform = `scale(${targetScale.toFixed(3)})`;

        // sync background breath animation speed: set CSS var --breath-duration to cycleLength seconds (min 4s)
        try {
          const durationSec = Math.max(4, Math.round(cycleLength));
          document.documentElement.style.setProperty('--breath-duration', `${durationSec}s`);
          if(!pageEl.classList.contains('breathing')) pageEl.classList.add('breathing');
        } catch(e){}

        // stop when finished
        if(totalLeft !== Infinity && totalLeft <= 0){
          clearInterval(timerInterval); timerInterval = null; startTS = null;
          statusEl.textContent = 'finished';
          startBtn.textContent = 'Start';
          playChime();
          if(voiceOn) speak('Session finished');
          circle.classList.remove('glow'); pulse.style.opacity = 0.12; phraseEl.classList.remove('show');
          return;
        }
      }

      // start/pause/stop
      function startTimer(){
        const s = readSettings();
        const cycleLen = s.inh + s.h1 + s.exh + s.h2;
        if(cycleLen <= 0){ alert('Set at least one positive phase length.'); return; }
        updateCycleLen(cycleLen);

        startTS = Date.now() - pauseOffset;
        if(s.total === -1) endTS = Infinity; else endTS = startTS + s.total*1000;
        paused = false;
        statusEl.textContent = 'running';
        startBtn.setAttribute('aria-pressed','true'); startBtn.textContent = 'Stop';
        circle.classList.add('glow'); pulse.style.opacity = 0.12; phraseEl.classList.add('show');

        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(tick, 120);

        try{ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
        tick();
      }

      function pauseTimer(){
        if(!startTS) return;
        paused = true;
        statusEl.textContent = 'paused';
        pauseOffset = Date.now() - startTS;
        if(timerInterval) clearInterval(timerInterval);
        synth.cancel();
        pulse.style.opacity = 0.06;
      }

      function stopTimer(){
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        startTS = null; endTS = null; paused = false; pauseOffset = 0; lastPhaseIndex = -1;
        startBtn.textContent = 'Start'; startBtn.setAttribute('aria-pressed','false');
        statusEl.textContent = 'stopped';
        phaseLabel.textContent = '—'; phaseTime.textContent = '0s'; totalTimeEl.textContent = '0s';
        phraseEl.textContent = 'Welcome — set your timings and press Start'; phraseEl.classList.remove('show');
        circle.style.transform = 'scale(0.95)'; circle.classList.remove('glow'); pulse.style.opacity = 0.12;
        playChime();
      }

      // events
      startBtn.addEventListener('click', ()=> {
        if(statusEl.textContent === 'running') stopTimer();
        else if(statusEl.textContent === 'paused') startTimer();
        else { pauseOffset = 0; startTimer(); }
      });

      pauseBtn.addEventListener('click', ()=> {
        if(statusEl.textContent === 'running') pauseTimer();
        else if(statusEl.textContent === 'paused') startTimer();
      });
      resetBtn.addEventListener('click', ()=> { stopTimer(); });

      // switch visuals
      function setSwitchVisual(toggleEl, on){
        const sw = toggleEl.querySelector('.switch');
        if(!sw) return;
        if(on) sw.classList.add('on'); else sw.classList.remove('on');
        toggleEl.setAttribute('aria-pressed', !!on);
      }
      setSwitchVisual(beepToggle, true); setSwitchVisual(voiceToggle, false);

      beepToggle.addEventListener('click', ()=> { beepOn = !beepOn; setSwitchVisual(beepToggle, beepOn); });
      voiceToggle.addEventListener('click', ()=> { voiceOn = !voiceOn; setSwitchVisual(voiceToggle, voiceOn); if(!voiceOn) synth.cancel(); });

      // keyboard
      window.addEventListener('keydown', (e)=>{
        if(e.key === ' ') { e.preventDefault(); startBtn.click(); }
        if(e.key === 'r' || e.key === 'R') { e.preventDefault(); resetBtn.click(); }
      });

      // live update cycle length when inputs change
      [inhaleEl, hold1El, exhaleEl, hold2El].forEach(el => el.addEventListener('input', ()=>{
        const s = readSettings(); updateCycleLen(s.inh + s.h1 + s.exh + s.h2);
      }));
      totalSelect.addEventListener('change', ()=> customTotalEl.value = '');

      // theme toggle (dark default)
      let lightMode = false;
      themeToggle.addEventListener('click', ()=>{
        lightMode = !lightMode;
        if(lightMode){
          document.documentElement.style.setProperty('--bg-a','#EAF8E7');
          document.documentElement.style.setProperty('--bg-b','#F3FFF6');
          document.documentElement.style.setProperty('--text-light','#023336');
          document.documentElement.style.setProperty('--muted','rgba(2,51,54,0.78)');
          document.documentElement.style.setProperty('--card-bg','rgba(2,51,54,0.03)');
          themeToggle.textContent = '☀️';
          // subtle color fixes for inputs and labels
          document.querySelectorAll('input, select').forEach(i => i.style.color = 'var(--text-light)');
        } else {
          document.documentElement.style.setProperty('--bg-a','#012421');
          document.documentElement.style.setProperty('--bg-b','#003733');
          document.documentElement.style.setProperty('--text-light','#EAF8E7');
          document.documentElement.style.setProperty('--muted','rgba(234,248,231,0.78)');
          document.documentElement.style.setProperty('--card-bg','rgba(255,255,255,0.02)');
          themeToggle.textContent = '🌙';
          document.querySelectorAll('input, select').forEach(i => i.style.color = 'var(--text-light)');
        }
      });

      // ensure initial UI values
      updateCycleLen( Number(inhaleEl.value) + Number(hold1El.value) + Number(exhaleEl.value) + Number(hold2El.value) );

      // spawn small particles continuously near circle center for ambiance
      setInterval(()=> {
        const rect = document.querySelector('.circle-wrap').getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        spawnParticle(cx + (Math.random()-0.5)*40, cy + (Math.random()-0.5)*40);
      }, 300);

      // ensure reduced motion respected
      if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){
        document.querySelectorAll('.breath-circle, .pulse-ring, .breath-circle').forEach(n => n.style.transition = 'none');
        document.documentElement.style.setProperty('--breath-duration','0s');
      }

    })();

    // kick off visuals after DOM loaded
    window.addEventListener('load', () => {
      resizeCanvases();
      initStars();
      drawStars();
      startAnimationLoops();
    });

  </script>
</body>
</html>
