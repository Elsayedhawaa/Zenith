<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zenith Breathing App - Enhanced Visibility</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>

  :root{
    --accent-1: #023336;
    --accent-2: #4DA564;
    --accent-3: #C1E6BA;
    --accent-4: #EAF8E7;
    --bg-dark-1: #021A18;
    --bg-dark-2: #012423;
  }

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: linear-gradient(180deg, var(--bg-dark-1), var(--bg-dark-2) 85%);
    color: var(--accent-4);
    overflow-y: auto;
  }

  body.light {
    background: #F9FFF9;
    color: var(--accent-1);
  }

  /* Removed app container box and shadow */
  .app {
    max-width: 1040px;
    margin: 48px auto 32px auto;
    padding: 12px 24px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 48px;
  }

  .controls {
    flex: 0 0 380px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .title {
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 4px;
    color: inherit;
    letter-spacing: -1px;
  }

  .subtitle {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent-3);
  }

  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  label {
    display: block;
    font-size: 14.5px;
    color: var(--accent-2);
    font-weight: 700;
    margin-bottom: 6px;
  }

  input[type=number], select {
    width: 100%;
    padding: 12px 12px;
    border-radius: 14px;
    border: 2px solid var(--accent-2);
    background: transparent;
    color: inherit;
    font-size: 16px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.3s ease;
  }

  input[type=number]:focus, select:focus {
    border-color: var(--accent-1);
  }

  .row {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .options {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    color: var(--accent-2);
  }

  .switch {
    width: 50px;
    height: 28px;
    border-radius: 30px;
    background: var(--accent-3);
    cursor: pointer;
    padding: 4px;
    position: relative;
    border: none;
  }

  .knob {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent-1);
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    transition: transform 0.25s cubic-bezier(.23,1.01,.32,1);
  }

  .muted-btn {
    background: transparent;
    border: 2px solid var(--accent-2);
    padding: 10px 20px;
    border-radius: 18px;
    color: var(--accent-2);
    font-weight: 700;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s ease;
  }

  .muted-btn:hover {
    background-color: var(--accent-2);
    color: var(--accent-4);
  }

  .start-large {
    background: linear-gradient(to right, var(--accent-2), #028a78);
    color: var(--accent-4);
    padding: 22px 56px;
    border-radius: 48px;
    font-weight: 700;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(2,51,54,0.21);
    border: none;
    transition: transform 0.25s ease, box-shadow 0.3s ease;
  }

  .start-large:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(2,51,54,0.3);
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: var(--accent-3);
    margin-top: 12px;
  }

  .hint {
    font-size: 14px;
    color: var(--accent-3);
    font-style: italic;
    margin-top: 4px;
  }

  .visual {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
    min-width: 380px;
  }

  .circle-wrap {
    width: 320px;
    height: 320px;
    display: grid;
    place-items: center;
    position: relative;
  }

  .pulse-ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.1;
    border: 3px solid #4DA56433;
    box-shadow: 0 12px 30px #4DA56430 inset;
    transition: transform 0.42s, opacity 0.42s;
    transform: scale(0.95);
  }

  .breath-circle {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at 30% 20%, #4da56420, #02333625);
    border: 3px solid #4DA56477;
    box-shadow: 0 20px 50px #4DA56455;
    transition: transform 0.56s cubic-bezier(.2,.9,.2,1), box-shadow 0.36s;
    will-change: transform, box-shadow;
  }

  .breath-circle.glow {
    box-shadow: 0 30px 75px #4DA564aa, 0 8px 30px #023336cc;
  }

  .phase-label {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent-4);
    opacity: 0.95;
    text-shadow: 0 2px 5px #0008;
  }

  .big-number {
    font-size: 64px;
    font-weight: 900;
    color: var(--accent-1);
    letter-spacing: -1.2px;
    margin-top: 10px;
    text-shadow: 0 6px 14px #4DA56488;
    line-height: 1.0;
  }

  .phrase {
    font-size: 18px;
    color: var(--accent-3);
    min-height: 38px;
    padding: 10px 18px;
    border-radius: 14px;
    background: rgba(0, 0, 0, 0.1);
    font-weight: 700;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transform: translateY(10px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }

  .phrase.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .start-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  /* Theme Button */
  .theme-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 9999;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #4DA564aa;
    background: transparent;
    color: var(--accent-2);
    font-size: 22px;
    cursor: pointer;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .theme-btn:hover {
    background-color: var(--accent-2);
    color: var(--accent-4);
  }

  /* Light theme overrides */
  body.light {
    background: #F0FFF5;
    color: var(--accent-1);
  }

  body.light input[type=number], body.light select {
    color: var(--accent-1);
    border-color: var(--accent-1);
    background: transparent;
  }

  body.light .pulse-ring {
    border-color: #02333645;
    opacity: 0.14;
  }
  
</style>
</head>
<body class="dark">

<button id="themeBtn" class="theme-btn" title="Toggle light/dark" aria-label="Toggle theme">🌙</button>

<div class="app" role="application" aria-label="Zenith Breathing App">
  <div class="controls" aria-label="Controls">
    <h1 class="title">Zenith Breathing App</h1>
    <div class="subtitle">A calm, private breathing tool — customize seconds, voice, and beep.</div>
    <div class="settings-grid" aria-hidden="false">
      <div>
        <label for="inhale">Inhale (sec)</label>
        <input id="inhale" type="number" min="0" value="4" />
      </div>
      <div>
        <label for="hold1">Hold after inhale (sec)</label>
        <input id="hold1" type="number" min="0" value="0" />
      </div>
      <div>
        <label for="exhale">Exhale (sec)</label>
        <input id="exhale" type="number" min="0" value="6" />
      </div>
      <div>
        <label for="hold2">Hold after exhale (sec)</label>
        <input id="hold2" type="number" min="0" value="0" />
      </div>
    </div>

    <div style="margin-top: 8px;">
      <label for="total">Total time</label>
      <div class="row">
        <select id="total" aria-label="Total time select">
          <option value="60">1 minute</option>
          <option value="120" selected>2 minutes</option>
          <option value="300">5 minutes</option>
          <option value="600">10 minutes</option>
          <option value="-1">Repeat indefinitely</option>
        </select>
        <input id="customTotal" type="number" min="10" placeholder="Custom sec (optional)" style="flex:1" />
      </div>
    </div>

    <div class="options" role="group" aria-label="Options">
      <div class="toggle" title="Toggle beep">
        <div class="small">Beep</div>
        <div id="beepSwitch" class="switch" role="button" aria-pressed="true"><div id="beepKnob" class="knob" style="transform:translateX(18px)"></div></div>
      </div>
      <div class="toggle" title="Toggle voice">
        <div class="small">Voice</div>
        <div id="voiceSwitch" class="switch" role="button" aria-pressed="false"><div id="voiceKnob" class="knob"></div></div>
      </div>
    </div>

    <div class="meta-row">
      <div class="small">Status: <strong id="status">stopped</strong></div>
      <div style="flex:1"></div>
      <div class="small">Cycle length: <strong id="cycleLen">0s</strong></div>
    </div>
    <div class="hint">Tip: Press <strong>Start</strong> or hit <strong>Space</strong>. Press <strong>R</strong> to reset.</div>
  </div>

  <div class="visual" aria-label="Visual">
    <div class="circle-wrap">
      <div id="pulse" class="pulse-ring"></div>
      <div id="circle" class="breath-circle" tabindex="0" role="img" aria-label="Breathing circle">
        <div style="text-align:center">
          <div class="phase-label" id="phase">—</div>
          <div class="big-number" id="phaseTime">0s</div>
          <div style="height: 10px;"></div>
          <div class="small">Total left: <span id="totalTime">0s</span></div>
        </div>
      </div>
    </div>

    <div class="phrase" id="phrase">Welcome — set your timings and press Start</div>

    <div class="start-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
      <button id="startBtn" class="start-large" aria-pressed="false">Start</button>
      <div style="display:flex; gap:12px; margin-top: 12px;">
        <button id="pauseBtn" class="muted-btn" title="Pause/resume">Pause</button>
        <button id="resetBtn" class="muted-btn" title="Reset (R)">Reset</button>
      </div>
    </div>
  </div>
</div>

<script>
const body = document.body;
const themeBtn = document.getElementById('themeBtn');
const inhaleEl = document.getElementById('inhale');
const hold1El = document.getElementById('hold1');
const exhaleEl = document.getElementById('exhale');
const hold2El = document.getElementById('hold2');
const totalEl = document.getElementById('total');
const customTotalEl = document.getElementById('customTotal');
const beepSwitch = document.getElementById('beepSwitch');
const beepKnob = document.getElementById('beepKnob');
const voiceSwitch = document.getElementById('voiceSwitch');
const voiceKnob = document.getElementById('voiceKnob');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const phaseLabel = document.getElementById('phase');
const phaseTime = document.getElementById('phaseTime');
const totalTime = document.getElementById('totalTime');
const statusEl = document.getElementById('status');
const cycleLenEl = document.getElementById('cycleLen');
const sessionPhrase = document.getElementById('phrase');
const circle = document.getElementById('circle');
const pulse = document.getElementById('pulse');

let beepOn = true;
let voiceOn = false;
let timerInterval = null;
let startTS = null;
let paused = false;
let pauseOffset = 0;
let endTS = null;
let lastPhaseIndex = -1;

// Speech synthesis debounce lock to prevent repeats
let speaking = false;
const synth = window.speechSynthesis;

function playChime() {
  if (!beepOn) return;
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o1 = audioCtx.createOscillator();
    const o2 = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const b = audioCtx.createBiquadFilter();
    b.type = 'lowpass';
    b.frequency.value = 2200;
    o1.type = 'sine';
    o2.type = 'sine';
    o1.frequency.value = 880;
    o2.frequency.value = 1320;
    o1.connect(g);
    o2.connect(g);
    g.connect(b);
    b.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.09, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 1.1);
    o1.start(now);
    o2.start(now);
    o1.stop(now + 1.1);
    o2.stop(now + 1.1);
  } catch(e) { console.warn('Chime error', e); }
}

function readSettings() {
  const inh = Math.max(0, Number(inhaleEl.value) || 0);
  const h1 = Math.max(0, Number(hold1El.value) || 0);
  const exh = Math.max(0, Number(exhaleEl.value) || 0);
  const h2 = Math.max(0, Number(hold2El.value) || 0);
  let total = Number(totalEl.value);
  const custom = Number(customTotalEl.value) || 0;
  if(custom >= 10) total = custom;
  return {inh, h1, exh, h2, total};
}

function formatSec(s) {
  s = Math.max(0, Math.round(s));
  if(s < 60) return s + 's';
  const m = Math.floor(s/60);
  const sec = s % 60;
  return `${m}m ${sec}s`;
}

function updateCycleDisplay(len) {
  cycleLenEl.textContent = `${Math.round(len)}s`;
}

// Debounced speak helper to avoid repeating numbers rapidly
function speak(text) {
  if (!voiceOn) return;
  if (!('speechSynthesis' in window)) return;
  if(speaking) return; // prevent overlapping

  speaking = true;
  try {
    synth.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.95;
    utterance.onend = () => speaking = false;
    synth.speak(utterance);
  } catch(e) {
    speaking = false;
    console.warn('Speech error', e);
  }
}

function setKnobVisual(switchEl, knobEl, on) {
  knobEl.style.transform = on ? 'translateX(22px)' : 'translateX(1px)';
  switchEl.setAttribute('aria-pressed', !!on);
}

setKnobVisual(beepSwitch, beepKnob, beepOn);
setKnobVisual(voiceSwitch, voiceKnob, voiceOn);

beepSwitch.addEventListener('click', () => {
  beepOn = !beepOn;
  setKnobVisual(beepSwitch, beepKnob, beepOn);
});
voiceSwitch.addEventListener('click', () => {
  voiceOn = !voiceOn;
  synth.cancel();
  setKnobVisual(voiceSwitch, voiceKnob, voiceOn);
});

themeBtn.addEventListener('click', () => {
  if(body.classList.contains('light')){
    body.classList.remove('light'); body.classList.add('dark'); themeBtn.textContent = '🌙';
  } else {
    body.classList.remove('dark'); body.classList.add('light'); themeBtn.textContent = '☀️';
  }
});

function resetUI(){
  statusEl.textContent = 'stopped';
  phaseLabel.textContent = '—';
  phaseTime.textContent = '0s';
  totalTime.textContent = '0s';
  sessionPhrase.textContent = 'Welcome — set your timings and press Start';
  sessionPhrase.classList.remove('show');
  circle.classList.remove('glow');
  pulse.style.opacity = 0.08;
  circle.style.transform = 'scale(0.95)';
  lastPhaseIndex = -1;
}
resetUI();

function startTimer(){
  const s = readSettings();
  const cycleLength = s.inh + s.h1 + s.exh + s.h2;
  if(cycleLength <= 0){
    alert('Set at least one positive phase length (inhale/exhale/hold).');
    return;
  }
  updateCycleDisplay(cycleLength);

  startTS = Date.now() - pauseOffset;
  if(s.total === -1) endTS = Infinity; else endTS = startTS + s.total * 1000;
  paused = false;
  statusEl.textContent = 'running';
  startBtn.setAttribute('aria-pressed', 'true');
  startBtn.textContent = 'Stop';

  circle.classList.add('glow');
  pulse.style.opacity = 0.12;
  sessionPhrase.classList.add('show');

  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tick, 120);

  try{ audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
  tick();
}

function pauseTimer() {
  if(!startTS) return;
  paused = true;
  statusEl.textContent = 'paused';
  pauseOffset = Date.now() - startTS;
  if(timerInterval) clearInterval(timerInterval);
  synth.cancel();
  pulse.style.opacity = 0.06;
}

function stopTimer() {
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  startTS = null;
  endTS = null;
  paused = false;
  pauseOffset = 0;
  lastPhaseIndex = -1;
  startBtn.textContent = 'Start';
  startBtn.setAttribute('aria-pressed', 'false');
  resetUI();
  playChime();
}

function tick() {
  const s = readSettings();
  const phases = [
    {name:'Inhale', len: s.inh},
    {name:'Hold', len: s.h1},
    {name:'Exhale', len: s.exh},
    {name:'Hold', len: s.h2}
  ];
  const cycleLength = phases.reduce((a,b) => a + b.len, 0);
  if(cycleLength <= 0) { stopTimer(); return; }

  const now = Date.now();
  const elapsed = (now - startTS) / 1000.0;
  const totalLeft = (endTS === Infinity) ? Infinity : Math.max(0, Math.round((endTS - now) / 1000));
  let cycleElapsed = elapsed % cycleLength;
  if(elapsed < 0) cycleElapsed = 0;

  let phaseIndex = 0;
  let t = cycleElapsed;
  for(let i=0; i<phases.length; i++){
    if(t <= phases[i].len){
      phaseIndex = i; 
      break;
    }
    t -= phases[i].len;
    if(i === phases.length-1) phaseIndex = phases.length-1;
  }

  const current = phases[phaseIndex];
  const phaseLeft = Math.max(0, current.len - t);

  if(phaseIndex !== lastPhaseIndex){
    playChime();
    if(voiceOn) speak(current.name);
    showPhraseForPhase(current.name);
    lastPhaseIndex = phaseIndex;
  }

  if(voiceOn && phaseLeft <= 3 && phaseLeft >= 1 && !speaking) {
    speak(String(Math.ceil(phaseLeft)));
  }

  phaseLabel.textContent = current.name;
  phaseTime.textContent = Math.ceil(phaseLeft) + 's';
  totalTime.textContent = (totalLeft === Infinity) ? '— (indefinite)' : formatSec(totalLeft);

  let targetScale = 0.95;
  if(current.name === 'Inhale'){
    const progress = current.len > 0 ? (1 - (phaseLeft / current.len)) : 1;
    targetScale = 0.82 + 0.38 * progress;
    pulse.style.transform = `scale(${0.98 + 0.28 * progress})`;
    pulse.style.opacity = (0.06 + 0.18 * progress);
  } else if(current.name === 'Exhale'){
    const progress = current.len > 0 ? (1 - (phaseLeft / current.len)) : 1;
    targetScale = 1.06 - 0.32 * progress;
    pulse.style.transform = `scale(${1.08 - 0.28 * progress})`;
    pulse.style.opacity = (0.06 + 0.12 * progress);
  } else {
    targetScale = 0.92 + 0.06 * Math.sin(performance.now() / 400);
    pulse.style.transform = `scale(0.95)`;
    pulse.style.opacity = 0.08;
  }
  circle.style.transform = `scale(${targetScale.toFixed(3)})`;

  if(totalLeft !== Infinity && totalLeft <= 0){
    clearInterval(timerInterval);
    timerInterval = null;
    startTS = null;
    statusEl.textContent = 'finished';
    startBtn.textContent = 'Start';
    playChime();
    if(voiceOn) speak('Session finished');
    circle.classList.remove('glow');
    pulse.style.opacity = 0.08;
    sessionPhrase.classList.remove('show');
  }
}

function showPhraseForPhase(phaseName){
  const map = {
    'Inhale': 'Inhale deeply…',
    'Hold': 'Hold gently…',
    'Exhale': 'Exhale slowly…'
  };
  const text = map[phaseName] || (phaseName === 'Hold' ? 'Hold gently…' : phaseName);
  sessionPhrase.classList.remove('show');
  setTimeout(() => { 
    sessionPhrase.textContent = text; 
    sessionPhrase.classList.add('show'); 
  }, 160);
}

startBtn.addEventListener('click', () => {
  if(statusEl.textContent === 'running'){
    stopTimer();
  } else if(statusEl.textContent === 'paused'){
    startTimer();
  } else {
    pauseOffset = 0;
    startTimer();
  }
});

pauseBtn.addEventListener('click', () => {
  if(statusEl.textContent === 'running') pauseTimer();
  else if(statusEl.textContent === 'paused') startTimer();
});

resetBtn.addEventListener('click', stopTimer);

window.addEventListener('keydown', e => {
  if(e.key === ' ') { e.preventDefault(); startBtn.click(); }
  if(e.key === 'r' || e.key === 'R') { e.preventDefault(); resetBtn.click(); }
});

function updateCycleLenFromInputs(){
  const s = readSettings();
  updateCycleDisplay(s.inh + s.h1 + s.exh + s.h2);
}
// Update on inputs change
[inhaleEl, hold1El, exhaleEl, hold2El].forEach(el => el.addEventListener('input', updateCycleLenFromInputs));
// Reset total custom input when total changes
totalEl.addEventListener('change', () => { customTotalEl.value = ''; });

updateCycleLenFromInputs();

setTimeout(()=>{ startBtn.focus({preventScroll:true}); }, 900);

</script>
</body>
</html>
