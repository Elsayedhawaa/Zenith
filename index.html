<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith Breathing App</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: background 2s ease;
    background: linear-gradient(135deg, #004d40, #00695c);
    animation: gradientShift 10s ease infinite alternate;
    color: #fff;
    overflow: hidden;
  }

  @keyframes gradientShift {
    0% { background: linear-gradient(135deg, #004d40, #00695c); }
    50% { background: linear-gradient(135deg, #00695c, #00796b); }
    100% { background: linear-gradient(135deg, #004d40, #00897b); }
  }

  .theme-toggle {
    position: fixed;
    top: 15px;
    right: 20px;
    background: none;
    border: none;
    color: #fff;
    font-size: 1.8rem;
    cursor: pointer;
    transition: transform 0.3s ease;
  }
  .theme-toggle:hover {
    transform: scale(1.1);
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 600;
    opacity: 0;
    animation: fadeIn 2s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .phrase {
    margin-top: 10px;
    font-size: 1.2rem;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .circle {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
    margin: 30px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 4s ease, box-shadow 2s ease;
  }

  .glow {
    box-shadow: 0 0 50px rgba(0, 255, 200, 0.7);
  }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  button {
    background: #00bfa5;
    border: none;
    color: #fff;
    padding: 10px 20px;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.3s, transform 0.3s;
  }
  button:hover {
    background: #1de9b6;
    transform: scale(1.05);
  }

  input {
    padding: 5px;
    border-radius: 6px;
    border: none;
    text-align: center;
  }

  .light-mode {
    background: linear-gradient(135deg, #b2dfdb, #e0f2f1);
    color: #004d40;
  }

  .light-mode .theme-toggle {
    color: #004d40;
  }

  .light-mode button {
    background: #004d40;
    color: #fff;
  }

  .light-mode .circle {
    background: rgba(0, 77, 64, 0.1);
    box-shadow: 0 0 20px rgba(0, 77, 64, 0.3);
  }
</style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle">🌙</button>
  <h1>Zenith Breathing App</h1>
  <div class="phrase" id="phrase">Ready?</div>
  <div class="circle" id="circle"></div>

  <div class="controls">
    <div>
      <label>Inhale:</label>
      <input type="number" id="inhaleTime" value="4" min="1">s
      <label>Hold:</label>
      <input type="number" id="holdTime" value="2" min="0">s
      <label>Exhale:</label>
      <input type="number" id="exhaleTime" value="4" min="1">s
      <label>Hold:</label>
      <input type="number" id="holdTime2" value="2" min="0">s
    </div>
    <div>
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
      <button id="soundToggle">Sound: ON</button>
    </div>
  </div>

  <audio id="chime" src="https://cdn.pixabay.com/audio/2022/03/15/audio_6b0aeb2d8e.mp3"></audio>

<script>
  const body = document.body;
  const themeToggle = document.getElementById("themeToggle");
  const circle = document.getElementById("circle");
  const phrase = document.getElementById("phrase");
  const chime = document.getElementById("chime");
  const startBtn = document.getElementById("startBtn");
  const pauseBtn = document.getElementById("pauseBtn");
  const resetBtn = document.getElementById("resetBtn");
  const soundToggle = document.getElementById("soundToggle");

  let inhaleTime = document.getElementById("inhaleTime");
  let holdTime = document.getElementById("holdTime");
  let exhaleTime = document.getElementById("exhaleTime");
  let holdTime2 = document.getElementById("holdTime2");

  let interval;
  let running = false;
  let soundOn = true;
  let darkMode = true;

  themeToggle.addEventListener("click", () => {
    darkMode = !darkMode;
    if (darkMode) {
      body.classList.remove("light-mode");
      themeToggle.textContent = "🌙";
    } else {
      body.classList.add("light-mode");
      themeToggle.textContent = "☀️";
    }
  });

  soundToggle.addEventListener("click", () => {
    soundOn = !soundOn;
    soundToggle.textContent = soundOn ? "Sound: ON" : "Sound: OFF";
  });

  const phases = ["Inhale deeply...", "Hold...", "Exhale slowly...", "Hold..."];
  let phaseIndex = 0;

  function updatePhrase(text) {
    phrase.style.opacity = 0;
    setTimeout(() => {
      phrase.textContent = text;
      phrase.style.opacity = 1;
    }, 500);
  }

  function playChime() {
    if (soundOn) {
      chime.currentTime = 0;
      chime.play();
    }
  }

  function breathe() {
    const times = [
      inhaleTime.value * 1000,
      holdTime.value * 1000,
      exhaleTime.value * 1000,
      holdTime2.value * 1000,
    ];

    let totalCycle = times.reduce((a, b) => a + b);
    let current = 0;
    phaseIndex = 0;
    updatePhrase(phases[phaseIndex]);

    circle.classList.add("glow");
    circle.style.transform = "scale(1.2)";

    interval = setInterval(() => {
      current += times[phaseIndex];
      setTimeout(() => {
        playChime();
        phaseIndex = (phaseIndex + 1) % phases.length;
        updatePhrase(phases[phaseIndex]);
        if (phaseIndex === 0) circle.style.transform = "scale(1.2)";
        else if (phaseIndex === 2) circle.style.transform = "scale(0.8)";
      }, times[phaseIndex]);

      if (current >= totalCycle) {
        clearInterval(interval);
        breathe();
      }
    }, totalCycle);
  }

  startBtn.addEventListener("click", () => {
    if (!running) {
      running = true;
      breathe();
    }
  });

  pauseBtn.addEventListener("click", () => {
    clearInterval(interval);
    running = false;
  });

  resetBtn.addEventListener("click", () => {
    clearInterval(interval);
    running = false;
    circle.style.transform = "scale(1)";
    circle.classList.remove("glow");
    updatePhrase("Ready?");
  });
</script>
</body>
</html>
