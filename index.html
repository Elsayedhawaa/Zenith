<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zenith Breathing App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent-1: #293855;   /* deep navy */
  --accent-2: #4165D5;   /* vivid blue */
  --accent-3: #F1AC20;   /* golden yellow */
  --accent-4: #C3E8C9;   /* mint green */
  --bg-light: #f5fbf7;
  --bg-dark-1: #293855;
  --bg-dark-2: #293855;
  --gradient-main: linear-gradient(105deg, #4165D5 60%, #F1AC20 100%);
  --gradient-accent: linear-gradient(90deg, #4165D5 75%, #F1AC20 100%);
}

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', system-ui, Arial, sans-serif;
  background: var(--bg-light);
  color: var(--accent-1);
  min-height: 100vh;
}

body.dark {
  background: var(--bg-dark-1);
  color: var(--accent-4);
}

.app {
  max-width: 980px;
  margin: 36px auto 36px auto;
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: flex-start;
  gap: 56px;
  padding: 24px;
}

@media (max-width:900px) {
  .app {
    flex-direction: column;
    align-items: stretch;
    gap: 36px;
    padding: 12px;
  }
}

.controls {
  flex: 0 0 380px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.title {
  font-size: 2.25rem;
  font-weight: 700;
  margin-bottom: 2px;
  letter-spacing: -1px;
  color: var(--accent-1);
}

body.dark .title {
  color: var(--accent-4);
}

.subtitle {
  font-size: 1rem;
  font-weight: 600;
  color: #4165D5;
  margin-bottom: 4px;
}

body.dark .subtitle {
  color: #C3E8C9;
}

.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px 18px;
}

label {
  display: block;
  font-size: 1rem;
  color: var(--accent-2);
  font-weight: 700;
  margin-bottom: 7px;
}

input[type=number], select {
  width: 100%;
  padding: 14px 10px;
  border-radius: 16px;
  border: none;
  background: var(--gradient-main);
  color: #fff;
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 0;
  box-shadow: 0 2px 24px #4165D533;
  transition: outline .2s, box-shadow .2s;
  outline: 2px solid transparent;
}

input[type=number]:focus, select:focus {
  outline: 2px solid #F1AC20;
  box-shadow: 0 2px 24px #F1AC2099;
}

body.dark input[type=number], body.dark select {
  background: linear-gradient(90deg, #293855 60%, #4165D5 100%);
  color: #F1AC20;
  box-shadow: 0 2px 20px #F1AC2066;
  border: none;
}

.row {
  display: flex;
  gap: 18px;
  align-items: center;
  margin-top: 0;
}

.options {
  display: flex;
  gap: 22px;
  align-items: center;
  padding-top: 4px;
}

.toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1em;
  font-weight: 600;
  color: var(--accent-2);
}

.switch {
  width: 54px;
  height: 30px;
  border-radius: 30px;
  position: relative;
  display: inline-flex;
  background: #C3E8C9;
  box-shadow: 0 2px 7px #4165D533;
  cursor: pointer;
  transition: background .21s;
  border: 2px solid #F1AC20;
  align-items: center;
}

.switch.on {
  background: var(--gradient-accent);
  box-shadow: 0 4px 14px #F1AC2069;
  border: 2px solid #4165D5;
}

.knob {
  position: absolute;
  left: 4px;
  top: 4px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 6px #4165D566;
  transition: left .2s cubic-bezier(.33,1.15,.44,1), background .2s;
}

.switch.on .knob {
  left: 28px;
  background: #4165D5;
}

.muted-btn {
  background: var(--gradient-main);
  border: none;
  padding: 10px 26px;
  border-radius: 18px;
  color: #fff;
  font-weight: 700;
  font-size: 1.08em;
  cursor: pointer;
  box-shadow: 0 2px 20px #4165D533;
  transition: background .22s, box-shadow .22s;
}

.muted-btn:hover {
  background: linear-gradient(92deg, #F1AC20 55%, #4165D5 100%);
  color: #fff;
  box-shadow: 0 2px 30px #F1AC2067;
}

.start-large {
  background: var(--gradient-main);
  color: #fff;
  padding: 22px 62px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 1.22em;
  border: none;
  cursor: pointer;
  box-shadow: 0 5px 30px #F1AC2057;
  transition: background .25s, box-shadow .19s, transform .16s;
  margin-top: 3px;
}

.start-large:hover {
  background: linear-gradient(92deg, #F1AC20 45%, #4165D5 100%);
  transform: translateY(-6px);
  box-shadow: 0 15px 30px #F1AC2077;
}

.meta-row {
  display: flex;
  gap: 18px;
  align-items: center;
  font-size: 1em;
  color: var(--accent-2);
  margin-top: 6px;
}

body.dark .meta-row {
  color: #C3E8C9;
}

.hint {
  font-size: 1em;
  color: var(--accent-2);
  font-style: italic;
  margin-top: 2px;
}

body.dark .hint {
  color: #C3E8C9;
}

.visual {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 38px;
  min-width: 370px;
}

.circle-wrap {
  width: 300px;
  height: 300px;
  display: grid;
  place-items: center;
  position: relative;
}

.pulse-ring {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.12;
  border: 3px solid #4165D566;
  box-shadow: 0 12px 30px #F1AC2033 inset;
  transition: transform .4s, opacity .4s;
  transform: scale(0.95);
}

.breath-circle {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: var(--gradient-main);
  border: 3px solid #F1AC20;
  box-shadow: 0 18px 60px #29385577;
  transition: transform .56s cubic-bezier(.2,.9,.2,1), box-shadow .36s;
  will-change: transform, box-shadow;
  color: #fff;
}

.breath-circle.glow {
  box-shadow: 0 30px 75px #4165D5bb, 0 8px 30px #F1AC20cc;
}

.phase-label {
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
  opacity: 0.95;
  text-shadow: 0 2px 5px #4165D566;
}

.big-number {
  font-size: 2.7rem;
  font-weight: 900;
  color: #fff;
  letter-spacing: -1.0px;
  margin-top: 7px;
  text-shadow: 0 6px 14px #F1AC2088;
  line-height: 1.1;
}

.phrase {
  font-size: 1.2rem;
  padding: 12px 26px;
  border-radius: 22px;
  background: var(--gradient-accent);
  color: #fff;
  font-weight: 700;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transform: translateY(12px);
  box-shadow: 0 2px 14px #29385539;
  min-height: 44px;
  transition: opacity .3s, transform .3s;
}

.phrase.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.start-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.theme-btn {
  position: fixed;
  top: 20px;
  right: 28px;
  z-index: 99;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--gradient-accent);
  color: #fff;
  border: none;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 2px 16px #4165D555;
  transition: background .21s, color .21s, box-shadow .2s;
}

.theme-btn:hover {
  background: linear-gradient(100deg, #F1AC20 50%, #4165D5 100%);
  color: #fff;
  box-shadow: 0 2px 24px #F1AC2073;
}

body.dark .app {
  background: var(--bg-dark-1);
  color: #C3E8C9;
}

body.dark .controls label {
  color: #F1AC20;
}

body.dark input[type=number], body.dark select {
  background: linear-gradient(98deg,#293855 55%,#4165D5 100%);
  color: #F1AC20;
}

body.dark .meta-row, body.dark .hint { color: #C3E8C9; }
body.dark .subtitle { color: #C3E8C9; }
body.dark .title { color: #C3E8C9; }
body.dark .phase-label, body.dark .big-number, body.dark .phrase { color: #fff; }

@media (max-width:600px) {
  .app { padding: 2vw; }
  .controls { min-width: 0; }
  .visual { min-width: 0; }
  .circle-wrap { width: 80vw; max-width: 300px; height:80vw; max-height: 300px; }
  .breath-circle, .pulse-ring { width:62vw; max-width:200px; height:62vw; max-height:200px;}
}

</style>
</head>
<body class="dark">

<button id="themeBtn" class="theme-btn" title="Toggle light/dark" aria-label="Toggle theme">🌙</button>

<div class="app" role="application" aria-label="Zenith Breathing App">
  <div class="controls" aria-label="Controls">
    <h1 class="title">Zenith Breathing App</h1>
    <div class="subtitle">A calm, private breathing tool — customize seconds, voice, and beep.</div>
    <div class="settings-grid" aria-hidden="false">
      <div>
        <label for="inhale">Inhale (sec)</label>
        <input id="inhale" type="number" min="0" value="4" />
      </div>
      <div>
        <label for="hold1">Hold after inhale (sec)</label>
        <input id="hold1" type="number" min="0" value="0" />
      </div>
      <div>
        <label for="exhale">Exhale (sec)</label>
        <input id="exhale" type="number" min="0" value="6" />
      </div>
      <div>
        <label for="hold2">Hold after exhale (sec)</label>
        <input id="hold2" type="number" min="0" value="0" />
      </div>
    </div>
    <div style="margin-top: 4px;">
      <label for="total">Total time</label>
      <div class="row">
        <select id="total" aria-label="Total time select">
          <option value="60">1 minute</option>
          <option value="120" selected>2 minutes</option>
          <option value="300">5 minutes</option>
          <option value="600">10 minutes</option>
          <option value="-1">Repeat indefinitely</option>
        </select>
        <input id="customTotal" type="number" min="10" placeholder="Custom sec (optional)" style="flex:1;" />
      </div>
    </div>
    <div class="options" role="group" aria-label="Options">
      <div class="toggle" title="Toggle beep">
        <span>Beep</span>
        <div id="beepSwitch" class="switch on" role="button" aria-pressed="true"><div id="beepKnob" class="knob"></div></div>
      </div>
      <div class="toggle" title="Toggle voice">
        <span>Voice</span>
        <div id="voiceSwitch" class="switch" role="button" aria-pressed="false"><div id="voiceKnob" class="knob"></div></div>
      </div>
    </div>
    <div class="meta-row">
      <div>Status: <strong id="status">stopped</strong></div>
      <div>Cycle length: <strong id="cycleLen">0s</strong></div>
    </div>
    <div class="hint">Tip: Press <strong>Start</strong> or hit <strong>Space</strong>. Press <strong>R</strong> to reset.</div>
  </div>
  <div class="visual" aria-label="Visual">
    <div class="circle-wrap">
      <div id="pulse" class="pulse-ring"></div>
      <div id="circle" class="breath-circle" tabindex="0" role="img" aria-label="Breathing circle">
        <div style="text-align:center">
          <div class="phase-label" id="phase">—</div>
          <div class="big-number" id="phaseTime">0s</div>
          <div style="height: 10px;"></div>
          <div class="small">Total left: <span id="totalTime">0s</span></div>
        </div>
      </div>
    </div>
    <div class="phrase" id="phrase">Welcome — set your timings and press Start</div>
    <div class="start-area">
      <button id="startBtn" class="start-large" aria-pressed="false">Start</button>
      <div style="display:flex; gap:18px; margin-top:14px;">
        <button id="pauseBtn" class="muted-btn" title="Pause/resume">Pause</button>
        <button id="resetBtn" class="muted-btn" title="Reset (R)">Reset</button>
      </div>
    </div>
  </div>
</div>

<script>
const body = document.body;
const themeBtn = document.getElementById('themeBtn');
const inhaleEl = document.getElementById('inhale');
const hold1El = document.getElementById('hold1');
const exhaleEl = document.getElementById('exhale');
const hold2El = document.getElementById('hold2');
const totalEl = document.getElementById('total');
const customTotalEl = document.getElementById('customTotal');
const beepSwitch = document.getElementById('beepSwitch');
const beepKnob = document.getElementById('beepKnob');
const voiceSwitch = document.getElementById('voiceSwitch');
const voiceKnob = document.getElementById('voiceKnob');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const phaseLabel = document.getElementById('phase');
const phaseTime = document.getElementById('phaseTime');
const totalTime = document.getElementById('totalTime');
const statusEl = document.getElementById('status');
const cycleLenEl = document.getElementById('cycleLen');
const sessionPhrase = document.getElementById('phrase');
const circle = document.getElementById('circle');
const pulse = document.getElementById('pulse');

let beepOn = true;
let voiceOn = false;
let timerInterval = null;
let startTS = null;
let paused = false;
let pauseOffset = 0;
let endTS = null;
let lastPhaseIndex = -1;

// Speech synthesis debounce lock to prevent repeats
let speaking = false;
const synth = window.speechSynthesis;

function playChime() {
  if (!beepOn) return;
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o1 = audioCtx.createOscillator();
    const o2 = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const b = audioCtx.createBiquadFilter();
    b.type = 'lowpass';
    b.frequency.value = 2200;
    o1.type = 'sine';
    o2.type = 'sine';
    o1.frequency.value = 880;
    o2.frequency.value = 1320;
    o1.connect(g);
    o2.connect(g);
    g.connect(b);
    b.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.09, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 1.1);
    o1.start(now);
    o2.start(now);
    o1.stop(now + 1.1);
    o2.stop(now + 1.1);
  } catch(e) { console.warn('Chime error', e); }
}

function readSettings() {
  const inh = Math.max(0, Number(inhaleEl.value) || 0);
  const h1 = Math.max(0, Number(hold1El.value) || 0);
  const exh = Math.max(0, Number(exhaleEl.value) || 0);
  const h2 = Math.max(0, Number(hold2El.value) || 0);
  let total = Number(totalEl.value);
  const custom = Number(customTotalEl.value) || 0;
  if(custom >= 10) total = custom;
  return {inh, h1, exh, h2, total};
}

function formatSec(s) {
  s = Math.max(0, Math.round(s));
  if(s < 60) return s + 's';
  const m = Math.floor(s/60);
  const sec = s % 60;
  return `${m}m ${sec}s`;
}

function updateCycleDisplay(len) {
  cycleLenEl.textContent = `${Math.round(len)}s`;
}

function speak(text) {
  if (!voiceOn) return;
  if (!('speechSynthesis' in window)) return;
  if(speaking) return; // prevent overlapping

  speaking = true;
  try {
    synth.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.95;
    utterance.onend = () => speaking = false;
    synth.speak(utterance);
  } catch(e) {
    speaking = false;
    console.warn('Speech error', e);
  }
}

function setKnobVisual(switchEl, knobEl, on) {
  if(on) {
    switchEl.classList.add('on');
  } else {
    switchEl.classList.remove('on');
  }
}

setKnobVisual(beepSwitch, beepKnob, beepOn);
setKnobVisual(voiceSwitch, voiceKnob, voiceOn);

beepSwitch.addEventListener('click', () => {
  beepOn = !beepOn;
  setKnobVisual(beepSwitch, beepKnob, beepOn);
});
voiceSwitch.addEventListener('click', () => {
  voiceOn = !voiceOn;
  synth.cancel();
  setKnobVisual(voiceSwitch, voiceKnob, voiceOn);
});

themeBtn.addEventListener('click', () => {
  if(body.classList.contains('light')){
    body.classList.remove('light'); body.classList.add('dark'); themeBtn.textContent = '🌙';
  } else {
    body.classList.remove('dark'); body.classList.add('light'); themeBtn.textContent = '☀️';
  }
});

function resetUI(){
  statusEl.textContent = 'stopped';
  phaseLabel.textContent = '—';
  phaseTime.textContent = '0s';
  totalTime.textContent = '0s';
  sessionPhrase.textContent = 'Welcome — set your timings and press Start';
  sessionPhrase.classList.remove('show');
  circle.classList.remove('glow');
  pulse.style.opacity = 0.07;
  circle.style.transform = 'scale(0.95)';
  lastPhaseIndex = -1;
}
resetUI();

function startTimer(){
  const s = readSettings();
  const cycleLength = s.inh + s.h1 + s.exh + s.h2;
  if(cycleLength <= 0){
    alert('Set at least one positive phase length (inhale/exhale/hold).');
    return;
  }
  updateCycleDisplay(cycleLength);

  startTS = Date.now() - pauseOffset;
  if(s.total === -1) endTS = Infinity; else endTS = startTS + s.total * 1000;
  paused = false;
  statusEl.textContent = 'running';
  startBtn.setAttribute('aria-pressed', 'true');
  startBtn.textContent = 'Stop';

  circle.classList.add('glow');
  pulse.style.opacity = 0.14;
  sessionPhrase.classList.add('show');

  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tick, 120);

  tick();
}

function pauseTimer() {
  if(!startTS) return;
  paused = true;
  statusEl.textContent = 'paused';
  pauseOffset = Date.now() - startTS;
  if(timerInterval) clearInterval(timerInterval);
  synth.cancel();
  pulse.style.opacity = 0.06;
}

function stopTimer() {
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  startTS = null;
  endTS = null;
  paused = false;
  pauseOffset = 0;
  lastPhaseIndex = -1;
  startBtn.textContent = 'Start';
  startBtn.setAttribute('aria-pressed', 'false');
  resetUI();
  playChime();
}

function tick() {
  const s = readSettings();
  const phases = [
    {name:'Inhale', len: s.inh},
    {name:'Hold', len: s.h1},
    {name:'Exhale', len: s.exh},
    {name:'Hold', len: s.h2}
  ];
  const cycleLength = phases.reduce((a,b) => a + b.len, 0);
  if(cycleLength <= 0) { stopTimer(); return; }

  const now = Date.now();
  const elapsed = (now - startTS) / 1000.0;
  const totalLeft = (endTS === Infinity) ? Infinity : Math.max(0, Math.round((endTS - now) / 1000));
  let cycleElapsed = elapsed % cycleLength;
  if(elapsed < 0) cycleElapsed = 0;

  let phaseIndex = 0;
  let t = cycleElapsed;
  for(let i=0; i<phases.length; i++){
    if(t <= phases[i].len){
      phaseIndex = i; 
      break;
    }
    t -= phases[i].len;
    if(i === phases.length-1) phaseIndex = phases.length-1;
  }

  const current = phases[phaseIndex];
  const phaseLeft = Math.max(0, current.len - t);

  if(phaseIndex !== lastPhaseIndex){
    playChime();
    if(voiceOn) speak(current.name);
    showPhraseForPhase(current.name);
    lastPhaseIndex = phaseIndex;
  }

  if(voiceOn && phaseLeft <= 3 && phaseLeft >= 1 && !speaking) {
    speak(String(Math.ceil(phaseLeft)));
  }

  phaseLabel.textContent = current.name;
  phaseTime.textContent = Math.ceil(phaseLeft) + 's';
  totalTime.textContent = (totalLeft === Infinity) ? '— (indefinite)' : formatSec(totalLeft);

  let targetScale = 0.95;
  if(current.name === 'Inhale'){
    const progress = current.len > 0 ? (1 - (phaseLeft / current.len)) : 1;
    targetScale = 0.82 + 0.38 * progress;
    pulse.style.transform = `scale(${0.98 + 0.28 * progress})`;
    pulse.style.opacity = (0.07 + 0.18 * progress);
  } else if(current.name === 'Exhale'){
    const progress = current.len > 0 ? (1 - (phaseLeft / current.len)) : 1;
    targetScale = 1.06 - 0.32 * progress;
    pulse.style.transform = `scale(${1.08 - 0.28 * progress})`;
    pulse.style.opacity = (0.07 + 0.12 * progress);
  } else {
    targetScale = 0.92 + 0.06 * Math.sin(performance.now() / 400);
    pulse.style.transform = `scale(0.95)`;
    pulse.style.opacity = 0.09;
  }
  circle.style.transform = `scale(${targetScale.toFixed(3)})`;

  if(totalLeft !== Infinity && totalLeft <= 0){
    clearInterval(timerInterval);
    timerInterval = null;
    startTS = null;
    statusEl.textContent = 'finished';
    startBtn.textContent = 'Start';
    playChime();
    if(voiceOn) speak('Session finished');
    circle.classList.remove('glow');
    pulse.style.opacity = 0.07;
    sessionPhrase.classList.remove('show');
  }
}

function showPhraseForPhase(phaseName){
  const map = {
    'Inhale': 'Inhale deeply…',
    'Hold': 'Hold gently…',
    'Exhale': 'Exhale slowly…'
  };
  const text = map[phaseName] || (phaseName === 'Hold' ? 'Hold gently…' : phaseName);
  sessionPhrase.classList.remove('show');
  setTimeout(() => { 
    sessionPhrase.textContent = text; 
    sessionPhrase.classList.add('show'); 
  }, 120);
}

startBtn.addEventListener('click', () => {
  if(statusEl.textContent === 'running'){
    stopTimer();
  } else if(statusEl.textContent === 'paused'){
    startTimer();
  } else {
    pauseOffset = 0;
    startTimer();
  }
});

pauseBtn.addEventListener('click', () => {
  if(statusEl.textContent === 'running') pauseTimer();
  else if(statusEl.textContent === 'paused') startTimer();
});

resetBtn.addEventListener('click', stopTimer);

window.addEventListener('keydown', e => {
  if(e.key === ' ') { e.preventDefault(); startBtn.click(); }
  if(e.key === 'r' || e.key === 'R') { e.preventDefault(); resetBtn.click(); }
});

function updateCycleLenFromInputs(){
  const s = readSettings();
  updateCycleDisplay(s.inh + s.h1 + s.exh + s.h2);
}
[inhaleEl, hold1El, exhaleEl, hold2El].forEach(el => el.addEventListener('input', updateCycleLenFromInputs));
totalEl.addEventListener('change', () => { customTotalEl.value = ''; });

updateCycleLenFromInputs();

setTimeout(()=>{ startBtn.focus({preventScroll:true}); }, 900);
</script>
</body>
</html>
