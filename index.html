<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zenith — Breathing App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink-dark:#062c23;
    --ink-light:#f6fffb;

    --green-primary:#10b981;
    --green-accent:#34d399;
    --green-deep:#047857;

    --bg-dark-a:#042019;
    --bg-dark-b:#064e3b;
    --bg-light-a:#eafff7;
    --bg-light-b:#d8fff0;

    --card-dark:#0b2e29;
    --card-light:#ffffff;

    --border-dark:#0ea5a3;
    --border-light:#34d399;

    --radius-card:20px;
    --radius-field:14px;

    --breath-duration: 10s;
    /* Fix brandbar spacing and prevent overlap */
.site-header{
  position:fixed; top:12px; left:12px; right:12px; z-index:12;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:10px 24px;
  background: var(--card-dark);
  border-radius: var(--radius-card);
  border: 3px solid var(--border-dark);
  box-shadow: 0 20px 54px rgba(16,185,129,.80), 0 9px 24px rgba(6,44,35,.70);
}
body.light .site-header {
  background: var(--card-light);
  border-color: var(--border-light);
  box-shadow: 0 14px 42px rgba(6,44,35,.32), 0 10px 28px rgba(16,185,129,.40);
}

/* Add margin below brandbar to separate from content */
.app{
  margin: 110px auto 28px; /* 110px leaves more space to prevent overlap */
  /* other unchanged */
}

/* Align toggle switches knob in center vertically and horizontally */
.switch {
  display: flex; 
  align-items: center; /* vertical centering */
  cursor: pointer;
  justify-content: flex-start;
  border-radius: 9999px;
  width: 64px;
  height: 36px;
  padding: 6px;
  border: 3px solid var(--green-accent);
  position: relative;
  background: var(--card-dark);
  box-shadow: 0 14px 32px rgba(16,185,129,0.38);
  transition: all 0.28s ease;
}
body.light .switch {
  background: var(--card-light);
  border-color: var(--green-primary);
  box-shadow: 0 8px 28px rgba(16,185,129,0.12);
}
.knob {
  width: 28px;
  height: 28px;
  background: #f6fffb;
  border-radius: 50%;
  box-shadow: 0 0 18px rgba(0,0,0,0.3);
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  left: 6px;
  transition: transform 0.28s ease;
}
.switch.on {
  border-color: var(--green-primary);
  background: var(--green-primary);
  box-shadow: 0 20px 56px rgba(16,185,129,0.64);
  justify-content: flex-end;
}
.switch.on .knob {
  transform: translate(calc(-50% + 26px), -50%);
}

/* Fix .brand-name color in light mode */
body.light .brand-name {
  color: var(--green-primary);
  text-shadow: none;
}

  }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }

  body{
    font-family:'Poppins',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    color:var(--ink-light);
    background: radial-gradient(1600px 900px at -10% -10%, #0aa174 0%, transparent 50%),
                linear-gradient(120deg,var(--bg-dark-a),var(--bg-dark-b));
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  }
  @keyframes bgBreath { 0%{filter:hue-rotate(0) brightness(1);} 50%{filter:hue-rotate(6deg) brightness(1.06);} 100%{filter:hue-rotate(0) brightness(1);} }
  body.breathing{ animation: bgBreath var(--breath-duration) linear infinite; }

  .sky{
    position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;
    pointer-events:none;opacity:.32;filter:blur(.7px);
    background:
      radial-gradient(circle at 25% 15%, #bbffe833 1.5px, transparent 2px),
      radial-gradient(circle at 78% 38%, #eafff64d 1.7px, transparent 2.4px),
      radial-gradient(circle at 12% 72%, #6ff3c244 1.3px, transparent 2px),
      radial-gradient(circle at 85% 80%, #10b98133 1.2px, transparent 1.9px),
      radial-gradient(circle at 50% 50%, #a7f3d022 1.1px, transparent 1.6px),
      transparent;
    background-size: 360px 360px, 300px 300px, 320px 320px, 360px 360px, 260px 260px;
    animation: skyMove 90s linear infinite;
  }
  @keyframes skyMove { 
    0%{background-position:0 0,40px 20px,80px 0,0 0,-40px 20px;}
    100%{background-position:700px 520px,380px 300px,560px 380px,320px 240px,200px 190px;}
  }
  .site-header{
    position:fixed; top:12px; left:12px; right:12px; z-index:10;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:10px 14px;
    background: var(--card-dark);
    border-radius: var(--radius-card);
    border: 3px solid var(--border-dark);
    box-shadow: 0 20px 54px rgba(16,185,129,.60), 0 9px 24px rgba(6,44,35,.50);
  }
  .brand-left{ display:flex; align-items:center; gap:12px; }
  .brand-name{
    font-weight:900; font-size:19px; letter-spacing:.3px; color:var(--ink-light);
    text-shadow: 0 2px 9px rgba(16,185,129,0.85);
  }
  .brand-logo{
    width:34px; height:34px;
  }
  .brand-logo .stroke{
    stroke:#a7f3d0; stroke-width:3; fill:none; stroke-linecap:round;
    stroke-dasharray:120; stroke-dashoffset:120; animation: dash 2.2s ease forwards;
    filter: drop-shadow(0 0 7px rgba(167,243,208,0.9));
  }
  @keyframes dash { to { stroke-dashoffset:0; } }
  .brand-logo .dot{ fill:#10b981; transform-origin: 17px 17px; animation: spinDot 6s linear infinite; }
  @keyframes spinDot { to { transform: rotate(360deg); } }
  .theme-btn{
    position:fixed; top:12px; right:12px; z-index:10;
    width:50px; height:50px; display:grid; place-items:center;
    border-radius:14px; color:var(--ink-light); cursor:pointer;
    background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.07));
    border:3px solid var(--green-accent);
    box-shadow: 0 12px 30px rgba(0,0,0,.38);
    transition: transform .18s ease, box-shadow .22s ease, filter .2s ease;
  }
  .theme-btn:hover{ transform: translateY(-2px); box-shadow: 0 16px 40px rgba(0,0,0,.45); filter:saturate(1.1); }
  .app{
    position:relative; z-index:1;
    width:min(1100px, 94vw);
    margin: 88px auto 28px;
    display:flex; flex-direction:column; gap:18px;
  }
  .card{
    position:relative;
    background: var(--card-dark);
    border: 3px solid var(--border-dark);
    border-radius: var(--radius-card);
    box-shadow: 0 22px 70px rgba(16,185,129,.75), 0 12px 36px rgba(6,44,35,.62);
    overflow: visible;
  }
  body.light .card {
    background: var(--card-light);
    border-color: var(--border-light);
    box-shadow: 0 18px 54px rgba(6,44,35,.25), 0 12px 30px rgba(16,185,129,.33);
  }
  .visual{
    order:-1; padding:18px 16px 18px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .circle-wrap{
    position:relative; width:min(520px,95%); aspect-ratio:1/1; min-width:260px;
    display:grid; place-items:center; padding:12px;
  }
  .bubbles{ position:absolute; inset:12px; z-index:1; pointer-events:none; }
  .bubble{
    position:absolute; bottom:-40px; border-radius:50%;
    background: radial-gradient(circle at 32% 28%, rgba(225,255,240,.95), rgba(200,255,235,.32));
    box-shadow: 0 10px 20px rgba(16,185,129,.34);
    filter: blur(.2px); opacity:.28; animation: floatUp linear forwards; pointer-events:none;
  }
  @keyframes floatUp {
    0%{ transform: translateY(0) scale(.9); opacity:0; }
    12%{ opacity:.32; }
    90%{ opacity:.18; }
    100%{ transform: translateY(-120%) scale(1.06); opacity:0; }
  }
  .pulse{
    position:absolute; inset:12px; border-radius:50%; pointer-events:none; z-index:2;
    border:4px solid rgba(167,243,208,.50);
    box-shadow: inset 0 30px 90px rgba(6,44,35,.45), 0 0 42px rgba(16,185,129,.50), 0 0 100px rgba(52,211,153,.62);
    opacity:.28;
    transform: scale(.96);
    transition: transform .4s ease, opacity .4s ease;
  }
  .orbit{
    position:absolute; inset:12px; border-radius:50%; pointer-events:none; z-index:2;
    box-shadow: 0 0 30px rgba(52,211,153,.38), 0 0 5px rgba(167,243,208,.42);
    animation: orbit 7.2s linear infinite;
    opacity:.82;
  }
  @keyframes orbit { to{ transform: rotate(360deg); } }
  .circle{
    position:relative; z-index:3; width:70%; min-width:220px; aspect-ratio:1/1; border-radius:50%;
    display:grid; place-items:center; text-align:center;
    color: var(--ink-light);
    background:
      radial-gradient(ellipse at 30% 22%, rgba(52,211,153,.55), rgba(16,185,129,.32) 60%, rgba(6,44,35,.10) 100%),
      conic-gradient(from 220deg, rgba(16,185,129,.82), rgba(52,211,153,.62), rgba(16,185,129,.82));
    border: 3px solid #a7f3d0;
    box-shadow: 0 46px 140px rgba(16,185,129,.72), 0 18px 48px rgba(6,44,35,.58), inset 0 0 34px rgba(255,255,255,.32);
    transition: transform 560ms cubic-bezier(.2,.9,.2,1), box-shadow 360ms;
    will-change: transform;
  }
  .circle.glow{
    box-shadow: 0 60px 160px rgba(16,185,129,.82), 0 28px 72px rgba(6,44,35,.70), inset 0 0 40px rgba(255,255,255,.38);
  }
  .phase{
    font-weight:900; font-size:clamp(18px,2.5vw,22px);
    letter-spacing:.4px; text-shadow:0 2px 12px rgba(0,0,0,.3);
  }
  .big{
    font-weight:900; font-size:clamp(48px,7vw,68px);
    letter-spacing:-.94px; color:#053a2d;
    text-shadow:0 12px 36px rgba(167,243,208,.9);
  }
  body.light .big{ color:#072f26; }
  .tiny{
    font-weight:800; font-size:15px; color:#e9fff7; opacity:.98;
  }
  body.light .tiny{ color:#08482d; }
  .phrase{
    font-size: clamp(14px, 2.2vw, 18px);
    font-weight:900;
    color:white;
    background: linear-gradient(120deg, var(--green-accent), var(--green-primary));
    padding: 12px 20px;
    border-radius:999px;
    box-shadow: 0 14px 44px rgba(16,185,129,.38);
    opacity:0; transform:translateY(8px);
    transition:opacity 260ms ease,transform 260ms ease;
  }
  .phrase.show{
    opacity:1; transform:none;
  }
  .actions{
    display:flex; gap:14px; align-items:center; justify-content:center; margin-top:8px; flex-wrap:wrap;
  }
  .btn{
    border:3px solid var(--green-accent); border-radius:44px; padding:14px 30px;
    font-weight:900; cursor:pointer; color:#062c23;
    background: linear-gradient(120deg, #a7f3d0, #34d399);
    box-shadow: 0 18px 44px rgba(16,185,129,.34);
    transition: transform 0.18s ease, box-shadow 0.28s ease, filter 0.28s ease, background 0.28s ease;
  }
  .btn:hover{
    transform: translateY(-3px);
    box-shadow: 0 28px 66px rgba(16,185,129,.52);
    filter: saturate(1.12);
    background: linear-gradient(120deg, #34d399, #10b981);
  }
  .btn.alt{
    color:var(--ink-light);
    background: linear-gradient(120deg,#10b981,#0ea5a3);
    border-color:#10b981;
  }
  .btn.alt:hover{
    background: linear-gradient(120deg,#0ea5a3,#10b981);
  }

  /* Controls */
  .controls{
    padding:18px 16px 20px;
    display:flex; flex-direction:column; gap:14px;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
  }
  .field{
    display:flex; flex-direction:column; gap:8px; padding:12px;
    border-radius: var(--radius-field);
    background: var(--card-dark);
    border:3px solid var(--border-dark);
    box-shadow: 0 14px 48px rgba(16,185,129,.5), 0 6px 24px rgba(6,44,35,.5);
  }
  body.light .field{
    background: var(--card-light);
    border-color: var(--border-light);
    box-shadow: 0 14px 48px rgba(6,44,35,.25), 0 8px 28px rgba(16,185,129,.35);
  }
  label{
    font-size:14px;
    font-weight:900;
    color:#bbffe9;
    letter-spacing:.28px;
  }
  body.light label{ color:#0b3a29; }

  input[type=number], select {
    border:3px solid var(--green-accent);
    background: var(--card-dark);
    color: var(--ink-light);
    padding:14px 18px;
    border-radius: var(--radius-field);
    font-weight:900;
    font-size:16px;
    outline:none;
    transition: border-color .25s ease, background .25s ease, color .25s ease;
    -webkit-appearance:none;
    appearance:none;
    filter: saturate(1.1);
  }
  input[type=number]::placeholder{ color: #bdfff2; opacity:.75; }
  input[type=number]:focus-visible, select:focus-visible {
    outline: 3px solid var(--green-accent);
    outline-offset: 4px;
  }
  body.light input[type=number], body.light select {
    background: var(--card-light);
    color: var(--ink-dark);
    border-color: var(--green-primary);
  }

  .row{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .row > select{ min-width:180px; }

  .options{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    align-items:center;
  }
  .toggle{
    cursor:pointer;
    user-select:none;
    color:#bbffe9;
    font-weight:900;
    display:flex;
    align-items:center;
    gap: 12px;
  }
  body.light .toggle{
    color:#0b3a29;
  }

  .switch{
    width:62px;
    height:32px;
    background: var(--card-dark);
    border-radius:9999px;
    padding:6px;
    border: 3px solid var(--green-accent);
    position: relative;
    box-shadow: 0 14px 32px rgba(16,185,129,.38);
    transition: all 0.3s ease;
  }
  body.light .switch{
    background: var(--card-light);
    border-color: var(--green-primary);
    box-shadow: 0 8px 28px rgba(16,185,129,.12);
  }
  .knob{
    width: 28px;
    height: 28px;
    background: #f6fffb;
    border-radius:50%;
    box-shadow: 0 0 18px rgba(0,0,0,0.3);
    position: absolute;
    top: 4px;
    left: 4px;
    transition: transform 0.25s ease;
  }
  .switch.on{
    border-color: var(--green-primary);
    background: var(--green-primary);
    box-shadow: 0 20px 56px rgba(16,185,129,0.64);
  }
  .switch.on .knob{
    transform: translateX(30px);
  }
  .meta{
    font-weight:900;
    color:#b4ffee;
    display:flex;
    justify-content:space-between;
    font-size:14px;
  }
  body.light .meta{
    color:#0a3a2e;
  }
  .hint{
    font-weight:900;
    color:#a4ffd5;
    font-size:13px;
  }
  body.light .hint{
    color:#0a3a2e;
  }

  /* Select options text black fallback */
  option{
    color:#000;
    background:#fff;
  }
  select.open{
    color:#000 !important;
    background:#fff !important;
  }

  /* Light mode body */
  body.light{
    color:var(--ink-dark);
    background: radial-gradient(1600px 900px at -10% -10%, #caffea 0%, transparent 50%), linear-gradient(180deg,var(--bg-light-a),var(--bg-light-b));
  }
  body.light .site-header,
  body.light .card{
    background: var(--card-light);
    border-color: var(--border-light);
    box-shadow: 0 16px 54px rgba(6,44,35,.25), 0 12px 34px rgba(16,185,129,.32);
  }
  body.light .pulse{
    border-color: var(--green-primary);
    box-shadow: inset 0 28px 80px rgba(6,44,35,.38), 0 0 40px var(--green-accent), 0 0 112px rgba(52,211,153,.45);
    opacity:.26;
  }
  body.light .orbit{
    box-shadow: 0 0 38px rgba(52,211,153,.40), 0 0 6px rgba(20,250,200,.52);
  }
  body.light .circle.glow{
    box-shadow: 0 68px 180px var(--green-primary), 0 32px 86px rgba(6,44,35,.70), inset 0 0 44px rgba(255,255,255,.44);
  }

  /* Responsive */
  @media (max-width:720px){
    .grid{ grid-template-columns: 1fr; }
    .actions{ flex-wrap:wrap; }
    .brand-name{ display:none; }
  }

  /* Reduce Motion */
  @media (prefers-reduced-motion: reduce){
    *{
      animation:none !important;
      transition:none !important;
    }
  }
</style>
</head>
<body class="breathing">
  <div class="sky" aria-hidden="true"></div>

  <header class="site-header" role="banner" aria-label="Zenith Branding and Controls">
    <div class="brand-left">
      <svg class="brand-logo" viewBox="0 0 34 34" aria-hidden="true" role="img" xmlns="http://www.w3.org/2000/svg">
        <circle class="stroke" cx="17" cy="17" r="12"/>
        <path d="M11 17 L17 9 L16 14 L22 14 L14 25 L15 19 Z" fill="var(--green-primary)" fill-opacity="0.95"/>
        <circle class="dot" cx="17" cy="17" r="2.6"/>
      </svg>
      <div class="brand-name">Zenith</div>
    </div>
    <button id="themeBtn" class="theme-btn" aria-label="Toggle theme" title="Toggle light and dark mode">🌙</button>
  </header>

  <main class="app" role="main" aria-label="Zenith breathing control interface">
    <section class="card visual" aria-label="Breathing visual">
      <div class="circle-wrap" id="circleWrap">
        <div class="bubbles" id="bubbles"></div>
        <canvas id="trail" style="position:absolute; inset:12px; z-index:1; pointer-events:none;"></canvas>

        <div id="pulse" class="pulse" aria-hidden="true"></div>
        <div class="orbit" aria-hidden="true"></div>

        <div id="circle" class="circle" role="img" aria-label="Breathing circle">
          <div>
            <div class="phase" id="phase">—</div>
            <div class="big" id="phaseTime">0s</div>
            <div class="tiny">Total left: <span id="totalTime">0s</span></div>
          </div>
        </div>
      </div>

      <div class="phrase" id="phrase">Welcome — set your timings and press Start</div>

      <div class="actions">
        <button id="startBtn" class="btn" aria-pressed="false" aria-keyshortcuts="Space Enter">Start</button>
        <button id="pauseBtn" class="btn alt" title="Pause/resume" aria-keyshortcuts="Space Enter">Pause</button>
        <button id="resetBtn" class="btn alt" title="Reset" aria-keyshortcuts="R r">Reset</button>
      </div>
    </section>

    <section class="card controls" aria-label="Controls">
      <div class="grid">
        <div class="field">
          <label for="inhale">Inhale (sec)</label>
          <input id="inhale" type="number" min="0" value="4" />
        </div>
        <div class="field">
          <label for="hold1">Hold after inhale (sec)</label>
          <input id="hold1" type="number" min="0" value="0" />
        </div>
        <div class="field">
          <label for="exhale">Exhale (sec)</label>
          <input id="exhale" type="number" min="0" value="6" />
        </div>
        <div class="field">
          <label for="hold2">Hold after exhale (sec)</label>
          <input id="hold2" type="number" min="0" value="0" />
        </div>
      </div>

      <div>
        <label for="total" style="font-size:13px; font-weight:900; color:#bbffea;">Total time</label>
        <div class="row">
          <select id="total" aria-label="Total session length">
            <option value="60">1 minute</option>
            <option value="120" selected>2 minutes</option>
            <option value="300">5 minutes</option>
            <option value="600">10 minutes</option>
            <option value="-1">Repeat indefinitely</option>
          </select>
          <input id="customTotal" type="number" min="10" placeholder="Custom sec (optional)" style="flex:1" />
        </div>
      </div>

      <div class="options" role="group" aria-label="Options toggles">
        <div id="beepToggle" class="toggle" role="button" aria-pressed="true" tabindex="0">
          <span>Beep</span>
          <div class="switch on"><div class="knob"></div></div>
        </div>
        <div id="voiceToggle" class="toggle" role="button" aria-pressed="false" tabindex="0">
          <span>Voice</span>
          <div class="switch"><div class="knob"></div></div>
        </div>
      </div>

      <div class="meta" aria-live="polite">
        <div>Status: <strong id="status">stopped</strong></div>
        <div>Cycle length: <strong id="cycleLen">0s</strong></div>
      </div>

      <div class="hint">Tip: press <strong>Space</strong> to Start/Pause, <strong>R</strong> to Reset.</div>
    </section>
  </main>

<script>
(() => {
  const themeBtn = document.getElementById('themeBtn');

  const inhaleEl = document.getElementById('inhale');
  const hold1El = document.getElementById('hold1');
  const exhaleEl = document.getElementById('exhale');
  const hold2El = document.getElementById('hold2');

  const totalSel = document.getElementById('total');
  const customTotalEl = document.getElementById('customTotal');

  const beepToggle = document.getElementById('beepToggle');
  const voiceToggle = document.getElementById('voiceToggle');

  const statusEl = document.getElementById('status');
  const cycleLenEl = document.getElementById('cycleLen');
  const phaseEl = document.getElementById('phase');
  const phaseTimeEl = document.getElementById('phaseTime');
  const totalTimeEl = document.getElementById('totalTime');

  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');

  const circle = document.getElementById('circle');
  const pulse = document.getElementById('pulse');
  const phrase = document.getElementById('phrase');

  const circleWrap = document.getElementById('circleWrap');
  const trailCanvas = document.getElementById('trail');
  const bubblesBox = document.getElementById('bubbles');

  let beepOn = true;
  let voiceOn = false;

  let timerInterval = null;
  let startTS = null;
  let pauseOffset = 0;
  let endTS = null;
  let lastPhaseIndex = -1;

  let pageHidden = false;

  let audioCtx = null;
  function chime() {
    if (!beepOn) return;
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const now = audioCtx.currentTime;
      const o1 = audioCtx.createOscillator();
      const o2 = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const f = audioCtx.createBiquadFilter();
      f.type = "lowpass";
      f.frequency.value = 2300;
      o1.type = "sine";
      o2.type = "sine";
      o1.frequency.value = 880;
      o2.frequency.value = 1320;
      o1.connect(g);
      o2.connect(g);
      g.connect(f);
      f.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.085, now + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 1.0);
      o1.start(now);
      o2.start(now);
      o1.stop(now + 1.02);
      o2.stop(now + 1.02);
    } catch (e) {}
  }

  const synth = window.speechSynthesis;
  function speak(text) {
    if (!voiceOn) return;
    if (!("speechSynthesis" in window)) return;
    try {
      synth.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = 0.95;
      synth.speak(u);
    } catch (e) {}
  }

  function readSettings() {
    const inh = Math.max(0, Number(inhaleEl.value) || 0);
    const h1 = Math.max(0, Number(hold1El.value) || 0);
    const exh = Math.max(0, Number(exhaleEl.value) || 0);
    const h2 = Math.max(0, Number(hold2El.value) || 0);
    let total = Number(totalSel.value);
    const custom = Number(customTotalEl.value) || 0;
    if (custom >= 10) total = custom;
    return { inh, h1, exh, h2, total };
  }
  function fmt(s) {
    s = Math.max(0, Math.round(s));
    return s < 60 ? s + "s" : Math.floor(s / 60) + "m " + (s % 60) + "s";
  }
  function updateCycleDisplay(len) {
    cycleLenEl.textContent = Math.round(len) + "s";
    if (len > 0) {
      document.documentElement.style.setProperty(
        "--breath-duration",
        Math.max(4, Math.round(len)) + "s"
      );
      document.body.classList.add("breathing");
    }
  }
  function showPhrase(name) {
    const map = {
      Inhale: "Inhale deeply…",
      Hold: "Hold gently…",
      Exhale: "Exhale slowly…",
    };
    phrase.classList.remove("show");
    setTimeout(() => {
      phrase.textContent = map[name] || "Hold gently…";
      phrase.classList.add("show");
    }, 120);
  }

  let ctx,
    w = 0,
    h = 0,
    rafId = null;
  const particles = [];
  function resizeCanvas() {
    const r = circleWrap.getBoundingClientRect();
    w = Math.floor(r.width - 20);
    h = Math.floor(r.height - 20);
    trailCanvas.width = w;
    trailCanvas.height = h;
    ctx = trailCanvas.getContext("2d");
    trailCanvas.style.left = "10px";
    trailCanvas.style.top = "10px";
  }
  window.addEventListener("resize", resizeCanvas, { passive: true });
  resizeCanvas();

  function emitParticles() {
    if (pageHidden) return;
    const size = Math.min(w, h) * 0.34;
    for (let i = 0; i < 3; i++) {
      const a = Math.random() * Math.PI * 2,
        r = size + (Math.random() * 8 - 4);
      particles.push({
        x: w / 2 + Math.cos(a) * r,
        y: h / 2 + Math.sin(a) * r,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        life: 28 + Math.random() * 16,
      });
    }
  }
  function stepParticles() {
    if (!ctx) {
      rafId = requestAnimationFrame(stepParticles);
      return;
    }
    ctx.globalCompositeOperation = "destination-out";
    ctx.fillStyle = "rgba(0,0,0,.10)";
    ctx.fillRect(0, 0, w, h);
    ctx.globalCompositeOperation = "lighter";
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.985;
      p.vy *= 0.985;
      p.life--;
      const a = Math.max(0, p.life / 40);
      ctx.fillStyle = `rgba(197,245,221,${a})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.4 + (1 - a) * 1.2, 0, Math.PI * 2);
      ctx.fill();
      if (p.life <= 0) particles.splice(i, 1);
    }
    rafId = requestAnimationFrame(stepParticles);
  }
  rafId = requestAnimationFrame(stepParticles);

  let bubbleInt = null;
  function startBubbles() {
    if (bubbleInt) return;
    bubbleInt = setInterval(() => {
      if (pageHidden) return;
      const b = document.createElement("div");
      b.className = "bubble";
      const s = 8 + Math.random() * 16;
      b.style.width = s + "px";
      b.style.height = s + "px";
      b.style.left = Math.random() * 86 + 7 + "%";
      b.style.animationDuration = 7 + Math.random() * 7 + "s";
      bubblesBox.appendChild(b);
      setTimeout(() => b.remove(), 14000);
    }, 1500);
  }
  function stopBubbles() {
    clearInterval(bubbleInt);
    bubbleInt = null;
  }

  function startTimer() {
    const s = readSettings();
    const cycleLen = s.inh + s.h1 + s.exh + s.h2;
    if (cycleLen <= 0) {
      alert("Set at least one positive phase length.");
      return;
    }
    updateCycleDisplay(cycleLen);
    startTS = Date.now() - pauseOffset;
    endTS = s.total === -1 ? Infinity : startTS + s.total * 1000;
    statusEl.textContent = "running";
    startBtn.textContent = "Stop";
    startBtn.setAttribute("aria-pressed", "true");
    circle.classList.add("glow");
    phrase.classList.add("show");
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(tick, 120);
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {}
    tick();
  }
  function pauseTimer() {
    if (!startTS) return;
    pauseOffset = Date.now() - startTS;
    statusEl.textContent = "paused";
    if (timerInterval) clearInterval(timerInterval);
    pulse.style.opacity = 0.24;
    synth.cancel();
  }
  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    startTS = null;
    endTS = null;
    pauseOffset = 0;
    lastPhaseIndex = -1;
    statusEl.textContent = "stopped";
    startBtn.textContent = "Start";
    startBtn.setAttribute("aria-pressed", "false");
    phaseEl.textContent = "—";
    phaseTimeEl.textContent = "0s";
    totalTimeEl.textContent = "0s";
    phrase.textContent = "Welcome — set your timings and press Start";
    phrase.classList.remove("show");
    circle.style.transform = "scale(.95)";
    circle.classList.remove("glow");
    pulse.style.opacity = 0.22;
    chime();
  }
  function tick() {
    const s = readSettings();
    const phases = [
      { name: "Inhale", len: s.inh },
      { name: "Hold", len: s.h1 },
      { name: "Exhale", len: s.exh },
      { name: "Hold", len: s.h2 },
    ];
    const cycleLen = phases.reduce((a, b) => a + b.len, 0);
    if (cycleLen <= 0) {
      stopTimer();
      return;
    }
    const now = Date.now(),
      elapsed = (now - startTS) / 1000,
      totalLeft =
        endTS === Infinity ? Infinity : Math.max(0, Math.round((endTS - now) / 1000));
    let t = elapsed % cycleLen,
      idx = 0;
    for (let i = 0; i < phases.length; i++) {
      if (t <= phases[i].len) {
        idx = i;
        break;
      }
      t -= phases[i].len;
      if (i === phases.length - 1) idx = phases.length - 1;
    }
    const cur = phases[idx],
      left = Math.max(0, cur.len - t);
    if (idx !== lastPhaseIndex) {
      chime();
      speak(cur.name);
      showPhrase(cur.name);
      lastPhaseIndex = idx;
      emitParticles();
    }
    phaseEl.textContent = cur.name;
    phaseTimeEl.textContent = Math.ceil(left) + "s";
    totalTimeEl.textContent =
      totalLeft === Infinity ? "— (indefinite)" : fmt(totalLeft);
    let scale = 0.95;
    if (cur.name === "Inhale") {
      const p = cur.len ? 1 - left / cur.len : 1;
      scale = 0.8 + 0.42 * p;
      pulse.style.transform = `scale(${0.98 + 0.32 * p})`;
      pulse.style.opacity = 0.22 + 0.22 * p;
    } else if (cur.name === "Exhale") {
      const p = cur.len ? 1 - left / cur.len : 1;
      scale = 1.1 - 0.36 * p;
      pulse.style.transform = `scale(${1.1 - 0.3 * p})`;
      pulse.style.opacity = 0.2 + 0.16 * p;
    } else {
      scale = 0.92 + 0.06 * Math.sin(performance.now() / 380);
      pulse.style.transform = "scale(0.96)";
      pulse.style.opacity = 0.22;
    }
    circle.style.transform = `scale(${scale.toFixed(3)})`;
    if (totalLeft !== Infinity && totalLeft <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      startTS = null;
      statusEl.textContent = "finished";
      startBtn.textContent = "Start";
      chime();
      speak("Session finished");
      circle.classList.remove("glow");
      pulse.style.opacity = 0.22;
      phrase.classList.remove("show");
    }
  }

  function wireKey(el, handler) {
    el.addEventListener("keydown", (e) => {
      if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        handler();
      }
    });
  }
  wireKey(startBtn, () => startBtn.click());
  wireKey(pauseBtn, () => pauseBtn.click());
  wireKey(resetBtn, () => resetBtn.click());
  wireKey(beepToggle, () => beepToggle.click());
  wireKey(voiceToggle, () => voiceToggle.click());

  startBtn.addEventListener("click", () => {
    if (statusEl.textContent === "running") stopTimer();
    else if (statusEl.textContent === "paused") startTimer();
    else {
      pauseOffset = 0;
      startTimer();
    }
  });
  pauseBtn.addEventListener("click", () => {
    if (statusEl.textContent === "running") pauseTimer();
    else if (statusEl.textContent === "paused") startTimer();
  });
  resetBtn.addEventListener("click", stopTimer);

  function setSwitch(el, on) {
    const sw = el.querySelector(".switch");
    el.setAttribute("aria-pressed", on ? "true" : "false");
    sw.classList.toggle("on", !!on);
  }
  setSwitch(beepToggle, true);
  setSwitch(voiceToggle, false);
  beepToggle.addEventListener("click", () => {
    beepOn = !beepOn;
    setSwitch(beepToggle, beepOn);
  });
  voiceToggle.addEventListener("click", () => {
    voiceOn = !voiceOn;
    setSwitch(voiceToggle, voiceOn);
    if (!voiceOn) synth.cancel();
  });

  window.addEventListener("keydown", (e) => {
    if (e.key === " ") {
      e.preventDefault();
      startBtn.click();
    }
    if (e.key === "r" || e.key === "R") {
      e.preventDefault();
      resetBtn.click();
    }
  });

  [inhaleEl, hold1El, exhaleEl, hold2El].forEach((el) =>
    el.addEventListener("input", () => {
      const s = readSettings();
      updateCycleDisplay(s.inh + s.h1 + s.exh + s.h2);
    })
  );
  totalSel.addEventListener("change", () => (customTotalEl.value = ""));

  themeBtn.addEventListener("click", () => {
    const light = !document.body.classList.contains("light");
    document.body.classList.toggle("light", light);
    themeBtn.textContent = light ? "☀️" : "🌙";
    const color = light ? "#0d3b2f" : "#f6fffb";
    [totalSel, inhaleEl, hold1El, exhaleEl, hold2El, customTotalEl].forEach((el) => {
      el.style.color = color;
    });
  });

  function setSelectOpen(open) {
    if (open) {
      totalSel.classList.add("open");
      totalSel.style.color = "#000";
      totalSel.style.background = "#fff";
    } else {
      totalSel.classList.remove("open");
      const light = document.body.classList.contains("light");
      totalSel.style.color = light ? "#0d3b2f" : "#f6fffb";
      totalSel.style.background = light ? "#fff" : "#0b2f26";
    }
  }
  totalSel.addEventListener("focus", () => setSelectOpen(true));
  totalSel.addEventListener("mousedown", () => setSelectOpen(true));
  totalSel.addEventListener("change", () => setSelectOpen(false));
  totalSel.addEventListener("blur", () => setSelectOpen(false));

  function onVisibility() {
    pageHidden = document.visibilityState !== "visible";
    if (pageHidden) stopBubbles();
    else startBubbles();
  }
  document.addEventListener("visibilitychange", onVisibility);
  onVisibility();

  const s0 = readSettings();
  updateCycleDisplay(s0.inh + s0.h1 + s0.exh + s0.h2);
  setTimeout(() => startBtn.focus({ preventScroll: true }), 700);
})();
</script>
</body>
</html>
