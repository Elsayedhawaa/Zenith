<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zenith Breathing App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --accent-1: #293855;
  --accent-2: #4165D5;
  --accent-3: #F1AC20;
  --accent-4: #C3E8C9;
  --gradient-btn: linear-gradient(110deg, #4165D5 65%, #F1AC20 100%);
  --gradient-btn-rev: linear-gradient(110deg, #F1AC20 55%, #4165D5 100%);
  --gradient-input: linear-gradient(93deg, #C3E8C9 80%, #4165D5 100%);
  --bg-dark: #202436;
  --bg-light: #e8f9ed;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Poppins', system-ui, Arial, sans-serif;
  background: var(--bg-dark);
  color: var(--accent-1);
  position: relative;
  overflow-x: hidden;
}

body.light {
  background: var(--bg-light);
  color: var(--accent-1);
}

.stars-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 0;
  background: radial-gradient(ellipse at top right, var(--accent-4) 20%, var(--accent-1) 100%);
  overflow: hidden;
}

.stars-bg svg {
  width: 100vw;
  height: 100vh;
  filter: blur(0.1px);
  opacity: 0.57;
}

/* App Container */
.app {
  max-width: 460px;
  margin: 72px auto 0 auto;
  border-radius: 38px;
  background: rgba(255 255 255 / 0.60);
  backdrop-filter: blur(9px);
  box-shadow: 0 2px 50px #4165D522, 0 4px 36px #29385517;
  padding: 32px 26px 28px 26px;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 32px;
  position: relative;
  z-index: 2;
}

body.dark .app {
  background: rgba(34 48 85 / 0.85);
  box-shadow: 0 2px 36px #29385539;
}

@media (max-width: 600px) {
  .app {
    max-width: 98vw;
    margin: 32px auto;
    padding: 5vw 2vw;
  }
}

/* Headers */
.title {
  font-size: 2.35rem;
  font-weight: 700;
  text-align: center;
  letter-spacing: -1px;
  color: var(--accent-1);
  text-shadow: 0 4px 20px #C3E8C980;
}

body.dark .title {
  color: var(--accent-4);
  text-shadow: 0 8px 22px #20243680;
}

.subtitle {
  font-size: 1.08rem;
  font-weight: 500;
  color: var(--accent-2);
  text-align: center;
  margin-top: 0.4em;
  margin-bottom: 2px;
  text-shadow: 0 0.5px 0 #fff3;
}

body.dark .subtitle {
  color: var(--accent-4);
  text-shadow: 0 0.5px 0 #102;
}

/* Grid Inputs */
.settings-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 17px 13px;
  margin: 0 -4px;
  justify-content: center;
}

.setting-box {
  flex: 1 0 46%;
  min-width: 130px;
  max-width: 200px;
  background: var(--gradient-input);
  border-radius: 17px;
  padding: 13px 14px 15px 14px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  box-shadow: 0 1.5px 9px #4165D533;
  border: none;
}

body.dark .setting-box {
  background: linear-gradient(93deg, var(--accent-1) 85%, var(--accent-2) 100%);
  color: var(--accent-3);
  box-shadow: 0 2px 14px var(--accent-1);
}

.setting-box label {
  margin-bottom: 5px;
  color: var(--accent-2);
  font-weight: 700;
  font-size: 1.03em;
}

body.dark .setting-box label {
  color: var(--accent-4);
}

input[type='number'] {
  border: none;
  border-radius: 12px;
  padding: 13px 10px;
  font-size: 1.10em;
  font-weight: 700;
  background: #fff;
  color: var(--accent-1);
  box-shadow: 0 1px 8px var(--accent-2);
  outline: none;
  transition: background 0.21s, color 0.2s;
}

body.dark input[type='number'] {
  background: #1c2537;
  color: var(--accent-3);
}

input[type='number']:focus {
  background: var(--accent-3);
  color: var(--accent-1);
}

body.dark input[type='number']:focus {
  background: var(--accent-4);
  color: var(--accent-1);
}

/* Select */
select {
  padding: 13px 10px;
  border-radius: 11px;
  border: none;
  background: var(--gradient-input);
  color: var(--accent-1);
  font-size: 1.10em;
  font-weight: 700;
  outline: none;
}

body.dark select {
  background: linear-gradient(93deg, var(--accent-1) 60%, var(--accent-2) 100%);
  color: var(--accent-4);
}

/* Row layout and toggles */
.row {
  display: flex;
  gap: 9px;
  align-items: center;
  margin: 8px 0;
}

.options {
  display: flex;
  gap: 17px;
  align-items: center;
  justify-content: center;
  margin: 6px 0 2px 0;
}

.toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1em;
  font-weight: 700;
  color: var(--accent-2);
  letter-spacing: 0.03em;
}

.switch {
  width: 46px;
  height: 27px;
  border-radius: 32px;
  box-shadow: 0 2px 8px var(--accent-1, #293855)22, 0 1px 1px #fff7;
  background: var(--accent-3, #F1AC20)cc;
  cursor: pointer;
  position: relative;
  border: 2px solid var(--accent-2);
  display: flex;
  align-items: center;
  transition: background 0.25s, border 0.18s;
}

.switch.on {
  background: var(--gradient-btn);
  border: 2px solid var(--accent-3);
  box-shadow: 0 2px 10px var(--accent-1, #293855)44;
}

.knob {
  position: absolute;
  left: 5px;
  top: 4px;
  width: 19px;
  height: 19px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 7px var(--accent-2, #4165D5)44;
  transition: left 0.2s cubic-bezier(0.52, 1.2, 0.44, 1.05), background 0.21s;
}

.switch.on .knob {
  left: 23px;
  background: var(--accent-2);
}

.switch:active .knob {
  box-shadow: 0 4px 6px #F1AC2076;
}

/* Buttons */
.muted-btn,
.start-large {
  font-weight: 700;
  font-size: 1.06em;
  border: none;
  border-radius: 20px;
  box-shadow: 0 3px 18px var(--accent-1)18;
  background: var(--gradient-btn-rev);
  color: #fff;
  padding: 15px 28px;
  cursor: pointer;
  margin-top: 6px;
  transition: background 0.27s, box-shadow 0.23s, transform 0.15s;
}

.start-large {
  font-size: 1.13em;
  padding: 17px 38px;
  border-radius: 33px;
  margin-top: 14px;
  animation: breathebtn 2.7s ease-in-out infinite;
}

@keyframes breathebtn {
  0% {
    transform: scale(1);
    box-shadow: 0 10px 22px var(--accent-2)58;
  }
  50% {
    transform: scale(1.07);
    box-shadow: 0 24px 36px var(--accent-3)cc;
  }
  100% {
    transform: scale(1);
  }
}

.muted-btn:hover,
.start-large:hover {
  background: var(--gradient-btn);
  color: #fff;
  box-shadow: 0 8px 29px var(--accent-3)73;
}

.meta-row,
.hint {
  text-align: center;
  font-size: 1.03em;
  color: var(--accent-2);
  margin-top: 8px;
}

body.dark .meta-row,
body.dark .hint {
  color: var(--accent-4);
}

/* Visual */
.visual {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  position: relative;
}

.circle-wrap {
  width: 180px;
  height: 180px;
  display: grid;
  place-items: center;
  position: relative;
}

.pulse-ring {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  opacity: 0.16;
  border: 3px solid var(--accent-4)bb;
  box-shadow: 0 10px 20px var(--accent-3)55 inset, 0 0 38px var(--accent-2)77;
  animation: pulseBG 5s ease-in-out infinite;
}

@keyframes pulseBG {
  0% {
    opacity: 0.15;
    filter: blur(0.5px);
  }

  56% {
    opacity: 0.34;
    filter: blur(3px);
  }

  100% {
    opacity: 0.15;
    filter: blur(0.5px);
  }
}

.breath-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at 40% 60%, var(--accent-3)aa 13%, var(--accent-2)70%);
  box-shadow: 0 10px 34px var(--accent-3)78, 0 2px 4px var(--accent-2)22;
  border: 2.5px solid #fff6;
  position: relative;
  transition: transform 0.48s cubic-bezier(0.18, 0.85, 0.22, 1.01), box-shadow 0.44s;
  will-change: transform, box-shadow;
  overflow: visible;
}

.breath-circle.glow {
  box-shadow: 0 28px 83px var(--accent-2)dd, 0 12px 32px var(--accent-3)cc;
}

.orbit {
  pointer-events: none;
  position: absolute;
  width: 140px;
  height: 140px;
  left: -10px;
  top: -10px;
  border-radius: 50%;
  box-shadow: 0 0 17px 4.5px var(--accent-2)55, 0 0 1.5px 2px var(--accent-3)80;
  opacity: 0.8;
  animation: orbmove 5.9s linear infinite;
}

@keyframes orbmove {
  0% {
    transform: rotate(0);
  }

  100% {
    transform: rotate(360deg);
  }
}

.phase-label {
  font-size: 1.11rem;
  font-weight: 700;
  color: #fff;
  opacity: 0.98;
  padding-top: 8px;
}

.big-number {
  font-size: 2.22rem;
  font-weight: 900;
  color: #fff;
  letter-spacing: -0.5px;
  text-shadow: 0 6px 14px var(--accent-2)40;
  line-height: 1.13;
  margin-bottom: -1px;
  margin-top: 0.7em;
}

.phrase {
  font-size: 1.12rem;
  padding: 11px 20px;
  border-radius: 19px;
  background: linear-gradient(90deg, var(--accent-3)cc 50%, var(--accent-2)cc 100%);
  color: #fff;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  box-shadow: 0 2px 10px var(--accent-2)55;
  min-height: 40px;
  text-align: center;
  transform: translateY(8px);
  transition: opacity 0.23s, transform 0.23s;
}

.phrase.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.start-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  margin-top: 10px;
}

.theme-btn {
  position: fixed;
  top: 16px;
  right: 18px;
  z-index: 10;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(223, 246, 255, 0.79);
  color: #fff;
  border: none;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 2px 20px var(--accent-2)44, 0 2px 10px var(--accent-3)30;
  transition: background 0.18s, box-shadow 0.18s;
  overflow: visible;
}

.theme-btn-inner {
  position: relative;
  width: 29px;
  height: 29px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.theme-sunmoon {
  width: 29px;
  height: 29px;
  border-radius: 50%;
  background: var(--accent-3);
  transition: background 0.15s;
  box-shadow: 0 4px 16px var(--accent-3), 0 0 8px #fff7;
  overflow: visible;
  display: flex;
  align-items: center;
  justify-content: center;
}

.theme-btn.dark .theme-sunmoon {
  background: var(--accent-1);
  box-shadow: 0 4px 14px var(--accent-2)76, 0 0 6px var(--accent-3)42;
}

.theme-crater {
  position: absolute;
  border-radius: 50%;
  opacity: 0.45;
  background: #fff6;
  transition: background 0.19s;
}

.theme-btn .theme-crater {
  left: 8px;
  top: 7px;
  width: 7px;
  height: 7px;
}

.theme-btn .theme-crater2 {
  left: 18px;
  top: 14px;
  width: 4px;
  height: 4px;
}

.theme-btn .theme-crater3 {
  left: 13px;
  top: 18px;
  width: 4px;
  height: 5px;
}

.theme-btn.dark .theme-crater,
.theme-btn.dark .theme-crater2,
.theme-btn.dark .theme-crater3 {
  background: #fff3;
  opacity: 0.15;
}
</style>
</head>
<body class="dark">

</div>

<button id="themeBtn" class="theme-btn dark" title="Toggle light/dark" aria-label="Toggle theme" aria-pressed="false" type="button">
  <span class="theme-btn-inner">
    <span class="theme-sunmoon"></span>

<div class="app" role="application" aria-label="Zenith Breathing App">

  <div class="settings-grid" id="settingsGrid">

        <option value="-1">Repeat indefinitely</option>
      </select>
      <input id="customTotal" type="number" min="10" placeholder="Custom sec (optional)" style="flex:1;" aria-label="Custom total time in seconds" />

  <div class="options" role="group" aria-label="Options">

    <div class="toggle" title="Toggle voice">
      <span>Voice</span>

        </div>

    </div>

      <div style="display:flex; gap:18px; margin-top:11px;">

        <button id="resetBtn" class="muted-btn" title="Reset (R)">Reset</button>
      </div>
    </div>
  </div>
</div>
