<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zenith — Breathing App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ------------------------------
       Root Variables & Global Styles
       ------------------------------ */
    :root {
      --ink-dark:#062c23;
      --ink-light:#f6fffb;
      --green-emerald:#10b981;
      --green-mint:#34d399;
      --green-deep:#047857;
      --teal:#0ea5a3;
      --bg-dark-a:#042019;
      --bg-dark-b:#064e3b;
      --bg-light-a:#eafff7;
      --bg-light-b:#d8fff0;
      --card-light:#ffffff;
      --card-dark:#0b2a22;
      --border-strong:#0ea5a3;
      --border-strong-dark:#34d399;
      --radius-card:18px;
      --radius-field:14px;
      --breath-duration:10s;
    }

    *,::before,*::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      font-family:'Poppins',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
      color:var(--ink-light);
      background: radial-gradient(1600px 900px at -10% -10%, #0aa174 0%, transparent 50%),
                  linear-gradient(120deg,var(--bg-dark-a),var(--bg-dark-b));
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* Background hue breathing */
    @keyframes bgBreath {
      0%{filter:hue-rotate(0) brightness(1);}
      50%{filter:hue-rotate(6deg) brightness(1.06);}
      100%{filter:hue-rotate(0) brightness(1);}
    }
    body.breathing{animation:bgBreath var(--breath-duration) linear infinite;}

    /* ------------------------------
       Starry Background
       ------------------------------ */
    .sky{
      position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:0;
      pointer-events:none; opacity:.32; filter: blur(.7px);
      background:
        radial-gradient(circle at 25% 15%, #bbffe833 1.5px, transparent 2px),
        radial-gradient(circle at 78% 38%, #eafff64d 1.7px, transparent 2.4px),
        radial-gradient(circle at 12% 72%, #6ff3c244 1.3px, transparent 2px),
        radial-gradient(circle at 85% 80%, #10b98133 1.2px, transparent 1.9px),
        radial-gradient(circle at 50% 50%, #a7f3d022 1.1px, transparent 1.6px),
        transparent;
      background-size: 360px 360px, 300px 300px, 320px 320px, 360px 360px, 260px 260px;
      animation: skyMove 90s linear infinite;
    }
    @keyframes skyMove {
      0%{background-position:0 0,40px 20px,80px 0,0 0,-40px 20px;}
      100%{background-position:700px 520px,380px 300px,560px 380px,320px 240px,200px 190px;}
    }

    /* ------------------------------
       Header & Logo
       ------------------------------ */
    .site-header{
      position:fixed; top:12px; left:12px; right:12px; z-index:10;
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding:10px 14px;
    }
    .brand-left{ display:flex; align-items:center; gap:12px; }
    .brand-name{
      font-weight:900; font-size:18px; letter-spacing:.3px; color:var(--ink-light);
      text-shadow:0 2px 10px rgba(16,185,129,.55);
    }

    .brand-logo{
      width:34px; height:34px;
    }
    .brand-logo .stroke{
      stroke:#a7f3d0; stroke-width:3; fill:none; stroke-linecap:round;
      stroke-dasharray:120; stroke-dashoffset:120;
      animation: dash 2.2s ease forwards;
      filter: drop-shadow(0 0 6px rgba(167,243,208,.9));
    }
    @keyframes dash { to { stroke-dashoffset:0; } }
    .brand-logo .dot{
      fill:#10b981; transform-origin: 17px 17px;
      animation: spinDot 6s linear infinite;
    }
    @keyframes spinDot { to { transform: rotate(360deg); } }

    .theme-btn{
      position:fixed; top:12px; right:12px; z-index:10;
      width:50px; height:50px; display:grid; place-items:center;
      border-radius:14px; color:var(--ink-light); cursor:pointer;
      background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.10));
      border:2px solid rgba(167,243,208,.7);
      box-shadow: 0 12px 28px rgba(0,0,0,.34);
      transition: transform .18s ease, box-shadow .22s ease, filter .2s ease;
    }
    .theme-btn:hover{
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(0,0,0,.38);
      filter:saturate(1.1);
    }

    /* ------------------------------
       App Container & Cards
       ------------------------------ */
    .app{
      position:relative; z-index:1;
      width:min(1100px,94vw);
      margin:88px auto 28px;
      display:flex; flex-direction:column; gap:18px;
    }

    .card{
      background: var(--card-dark);
      border:3px solid var(--border-strong-dark);
      border-radius: var(--radius-card);
      box-shadow: 0 18px 54px rgba(16,185,129,.30),
                  0 8px 22px rgba(6,44,35,.45);
    }
    body.light .card{
      background: var(--card-light);
      border-color: var(--border-strong);
      box-shadow: 0 14px 40px rgba(6,44,35,.18),
                  0 6px 18px rgba(16,185,129,.22);
    }

    /* ------------------------------
       Breathing Visual
       ------------------------------ */
    .visual{ order:-1; padding:16px 14px; display:flex; flex-direction:column; align-items:center; gap:12px; }
    .circle-wrap{
      position:relative; width:min(520px,95%); aspect-ratio:1/1; min-width:260px;
      display:grid; place-items:center; padding:10px;
    }
    .pulse{
      position:absolute; inset:10px; border-radius:50%; pointer-events:none; z-index:2;
      border:4px solid rgba(167,243,208,.36);
      box-shadow: inset 0 28px 80px rgba(6,44,35,.24),
                  0 0 44px rgba(16,185,129,.30),
                  0 0 90px rgba(52,211,153,.42);
      opacity:.22;
    }
    .orbit{
      position:absolute; inset:10px; border-radius:50%; pointer-events:none; z-index:2;
      box-shadow: 0 0 32px rgba(52,211,153,.32), 0 0 4px rgba(167,243,208,.32);
      animation: orbit 7.2s linear infinite; opacity:.82;
    }
    @keyframes orbit { to{ transform: rotate(360deg);} }

    .circle{
      position:relative; z-index:3; width:70%; min-width:220px; aspect-ratio:1/1; border-radius:50%;
      display:grid; place-items:center; text-align:center; color:var(--ink-light);
      background:
        radial-gradient(ellipse at 30% 22%, rgba(52,211,153,.55), rgba(16,185,129,.32) 55%, rgba(6,44,35,.10) 100%),
        conic-gradient(from 220deg, rgba(16,185,129,.80), rgba(52,211,153,.50), rgba(16,185,129,.80));
      border: 3px solid #a7f3d0;
      box-shadow: 0 40px 120px rgba(16,185,129,.65),
                  0 18px 46px rgba(6,44,35,.58),
                  inset 0 0 30px rgba(255,255,255,.30);
    }

    .phase{ font-weight:900; font-size: clamp(18px, 2.5vw, 22px); }
    .big{ font-weight:900; font-size: clamp(44px, 6.4vw, 64px); color:#053a2f; }
    body.light .big{ color:#072f26; }
    .tiny{ font-weight:800; font-size:14px; color:#e9fff7; }
    body.light .tiny{ color:#07382e; }

    .phrase{
      font-size: clamp(14px, 2.2vw, 18px); font-weight:900; color:white;
      background: linear-gradient(120deg, #34d399, #10b981);
      padding: 12px 18px; border-radius:999px;
      box-shadow: 0 14px 42px rgba(16,185,129,.38);
      opacity:0; transform:translateY(8px);
      transition:opacity 260ms, transform 260ms;
    }
    .phrase.show{ opacity:1; transform:none; }

    .actions{ display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; }
    .btn{
      border:3px solid #34d399; border-radius:44px; padding:14px 26px;
      font-weight:900; cursor:pointer;
      color:#062c23; background: linear-gradient(120deg,#a7f3d0,#34d399);
      box-shadow: 0 18px 40px rgba(16,185,129,.34);
      transition: transform .16s, box-shadow .22s, filter .22s, background .22s;
    }
    .btn:hover{ transform: translateY(-3px); box-shadow: 0 26px 60px rgba(16,185,129,.44); filter:saturate(1.08); }
    .btn.alt{ color:var(--ink-light); background: linear-gradient(120deg,#0ea5a3,#10b981); border-color:#0ea5a3; }

    /* ------------------------------
       Responsive
       ------------------------------ */
    @media (max-width:760px){
      .grid{ grid-template-columns:1fr; }
      .brand-name{ display:none; }
    }
  </style>
</head>

<body class="breathing">
  <div class="sky" aria-hidden="true"></div>

  <header class="site-header">
    <div class="brand-left">
      <svg class="brand-logo" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg" aria-label="Zenith logo">
        <circle cx="17" cy="17" r="12" class="stroke"/>
        <path d="M11 17 L17 9 L16 14 L22 14 L14 25 L15 19 Z" fill="#10b981" opacity="0.95"/>
        <circle cx="17" cy="17" r="2.6" class="dot"/>
      </svg>
      <div class="brand-name">Zenith</div>
    </div>
    <button id="themeBtn" class="theme-btn" title="Toggle light/dark" aria-label="Toggle theme">🌙</button>
  </header>

  <main class="app">
    <section class="card visual">
      <div class="circle-wrap" id="circleWrap">
        <canvas id="trail" style="position:absolute; inset:10px; z-index:1; pointer-events:none;"></canvas>
        <div id="pulse" class="pulse"></div>
        <div class="orbit"></div>
        <div id="circle" class="circle">
          <div>
            <div class="phase" id="phase">—</div>
            <div class="big" id="phaseTime">0s</div>
            <div class="tiny">Total left: <span id="totalTime">0s</span></div>
          </div>
        </div>
      </div>
      <div class="phrase" id="phrase">Welcome — set your timings and press Start</div>
      <div class="actions">
        <button id="startBtn" class="btn">Start</button>
        <button id="pauseBtn" class="btn alt">Pause</button>
        <button id="resetBtn" class="btn alt">Reset</button>
      </div>
    </section>
  </main>

  <script>
    // You can paste the JavaScript portion from your previous version here
    // (It was truncated in your input). Ensure you keep all logic inside this script.
  </script>
</body>
</html>
